    } else {
      if (r.playerCrit) html += '<span class="ba-crit">暴击！</span>';
      html += ' 造成 <span class="ba-dmg">' + r.playerDamage + '</span> 点伤害';
      html += ' → 敌方 HP ' + Math.max(0, r.npcHp) + (r.npcHp > 0 ? '' : ' 💀');
    }
    html += '</div>';
    
    // NPC攻击（如果NPC还活着）
    if (r.npcHp > 0 || r.npcDamage > 0 || r.playerDodged) {
      html += '<div class="battle-action npc-attack">';
      html += '<span class="ba-who">' + npc.name + '</span> 反击，';
      if (r.playerDodged) {
        html += '<span style="color:#888;">被你闪避了！</span>';
      } else {
        if (r.npcCrit) html += '<span class="ba-crit">暴击！</span>';
        html += ' 造成 <span class="ba-dmg">' + r.npcDamage + '</span> 点伤害';
        html += ' → 你的 HP ' + Math.max(0, r.playerHp);
      }
      html += '</div>';
    }
    
    if (r.special) {
      var specialIcon = '⚡';
      if (/复活|涅槃|不死/.test(r.special)) specialIcon = '💫';
      if (/闪避/.test(r.special)) specialIcon = '💨';
      if (/恢复|回血/.test(r.special)) specialIcon = '💚';
      html += '<div class="battle-special">' + specialIcon + ' ' + r.special + '</div>';
    }
    
    // HP条更新（带变化量）
    html += '<div class="battle-hp-row">';
    html += '<div style="flex:1;text-align:left;">';
    html += '<div class="battle-hp-mini"><div class="battle-hp-fill player" style="width:' + Math.max(0, pHpPct) + '%"></div></div>';
    html += '<div style="font-size:14px;margin-top:2px;">' + r.playerHp + ' / ' + battle.playerMaxHp + playerHpChangeText + '</div>';
    html += '</div>';
    html += '<span class="battle-vs-small" style="margin:0 8px;">VS</span>';
    html += '<div style="flex:1;text-align:right;">';
    html += '<div class="battle-hp-mini right"><div class="battle-hp-fill npc" style="width:' + Math.max(0, nHpPct) + '%"></div></div>';
    html += '<div style="font-size:14px;margin-top:2px;">' + r.npcHp + ' / ' + battle.npcMaxHp + npcHpChangeText + '</div>';
    html += '</div>';
    html += '</div>';
    
    html += '</div>';
  });
  html += '</div>';
  
  // 战斗总结
  html += '<div class="battle-summary">';
  html += '<div style="display:flex;justify-content:space-between;font-size:18px;">';
  html += '<div>总回合数：<b>' + battle.rounds.length + '</b></div>';
  html += '<div>你总伤害：<b style="color:#50c878;">' + battle.rounds.reduce(function(s,r){return s+r.playerDamage;},0) + '</b></div>';
  html += '<div>敌方总伤害：<b style="color:#e0526a;">' + battle.rounds.reduce(function(s,r){return s+r.npcDamage;},0) + '</b></div>';
  html += '</div>';
  html += '</div>';
  
  // 结果
  var resultClass = battle.winner === "player" ? "win" : (battle.winner === "npc" ? "lose" : "draw");
  var resultText = battle.winner === "player" ? "🏆 胜利！" : (battle.winner === "npc" ? "💀 败北..." : "🏳️ 平局！");
  html += '<div class="battle-result ' + resultClass + '">' + resultText + '</div>';
  
  if (battle.usedItem && battle.usedItem.length > 0) {
    var itemNames = battle.usedItem.map(function(i){ return i.icon+i.name; }).join("、");
    html += '<div class="battle-used-item">💊 战斗中使用了 ' + itemNames + '</div>';
  }
  
  return html;
}

// ===== 获得经验并检查升级 =====
// 返回 {levelUp: bool, newLevel: int, xpGained: int}
function gainXP(player, amount, reason) {
  if (!player.xp) player.xp = 0;
  var oldLevel = player.level;
  player.xp += amount;
  
  // 检查升级
  for (var i = LEVEL_TABLE.length-1; i >= 0; i--) {
    if (player.xp >= LEVEL_TABLE[i].xpNeeded) {
      player.level = LEVEL_TABLE[i].level;
      break;
    }
  }
  
  var levelUp = player.level > oldLevel;
  var newLevel = player.level;
  
  if (levelUp) {
    var lvlData = LEVEL_TABLE.find(function(l){return l.level==player.level;});
    if (lvlData && lvlData.bonus) {
      var b = lvlData.bonus;
      player.hp += b.hp; player.mp += b.mp;
      player.atk += b.atk; player.def += b.def;
      player.matk += b.matk; player.mdef += b.mdef;
      addGrowthLog({
        date: todayStr(), icon:"⬆️", desc:"升级！" + lvlData.title + " (Lv."+player.level+")",
        gains: "HP+"+b.hp+" MP+"+b.mp+" ATK+"+b.atk+" DEF+"+b.def
      });
    }
  }
  
  return { levelUp: levelUp, newLevel: newLevel, xpGained: amount };
}

// ===== 每日打卡 =====
function doCheckin() {
  var player = getPlayer();
  var today = todayStr();
  var lastCheckin = getCheckinDate();

  if (lastCheckin === today) {
    showToast("今天已经打过卡了，明天再来吧！");
    return false;
  }

  // 更新打卡
  saveCheckinDate(today);
  player.totalChecks++;
  
  // 检查连续打卡
  var yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  var yesterdayStr = yesterday.toISOString().split("T")[0];
  if (lastCheckin === yesterdayStr) {
    player.streak++;
  } else {
    player.streak = 1;
  }

  // 打卡获得经验（使用配置文件参数）
  // 基础经验 + 连续打卡加成（3天15%，5天30%）
  var baseXp = GAME_CONFIG.xpPerCheckin;
  var streakBonus = 0;
  if (player.streak >= 3) streakBonus = GAME_CONFIG.xpStreak3Bonus;
  if (player.streak >= 5) streakBonus = GAME_CONFIG.xpStreak5Bonus;
  var xpGain = Math.floor(baseXp * (1 + streakBonus));
  if (xpGain < 1) xpGain = 1;

  // 基础属性增长（使用配置文件参数）
  var gains = GAME_CONFIG.checkinGains;
  player.hp += gains.hp;
  player.mp += gains.mp;
  player.atk += gains.atk;
  player.def += gains.def;
  player.matk += gains.matk;
  player.mdef += gains.mdef;

  // 获得经验并检查升级
  var xpResult = gainXP(player, xpGain);

  // 记录
  var logEntry = {
    date: today, icon:"✅", desc:"每日打卡 · 第 " + player.totalChecks + " 天",
    gains: "经验+"+xpGain+" HP+"+gains.hp+" MP+"+gains.mp+" ATK+"+gains.atk+" DEF+"+gains.def
  };
  addGrowthLog(logEntry);

  if (xpResult.levelUp) {
    var lvlData = LEVEL_TABLE.find(function(l){return l.level==player.level;});
    if (lvlData && lvlData.bonus) {
      var b = lvlData.bonus;
      player.hp += b.hp; player.mp += b.mp;
      player.atk += b.atk; player.def += b.def;
      player.matk += b.matk; player.mdef += b.mdef;
      gains.hp += b.hp; gains.mp += b.mp;
      gains.atk += b.atk; gains.def += b.def;
      gains.matk += b.matk; gains.mdef += b.mdef;
      addGrowthLog({
        date: today, icon:"⬆️", desc:"升级！" + lvlData.title + " (Lv."+player.level+")",
        gains: "HP+"+b.hp+" MP+"+b.mp+" ATK+"+b.atk+" DEF+"+b.def
      });
    }
  }

  // 抽装备
  var drawnItem = drawEquipment();
  if (drawnItem) {
    player.inventory[drawnItem.id] = (player.inventory[drawnItem.id] || 0) + 1;
    addGrowthLog({
      date: today, icon:drawnItem.icon, desc:"抽到装备：" + drawnItem.name + " (" + rarityName(drawnItem.rarity) + ")",
      gains: drawnItem.type==="weapon"?"ATK+"+drawnItem.atk+" MATK+"+drawnItem.matk:"DEF+"+drawnItem.def+" MDEF+"+drawnItem.mdef
    });
  }

  savePlayer(player);

  // 今日挑战
  var dailyOpp = { date: todayStr(), npc: pickDailyOpponent(), completed: false, result: null, usedItem: null, drops: [] };
  saveDailyOpponent(dailyOpp);

  return {
    player: player,
    gains: gains,
    levelUp: xpResult.levelUp,
    newLevel: player.level,
    drawnItem: drawnItem,
    dailyOpp: dailyOpp,
    streak: player.streak
  };
}

// ===== 抽装备 =====
function drawEquipment(qualityBonus) {
  if (!qualityBonus) qualityBonus = 0;
  var rates = [
    {rarity:"common",weight:40},
    {rarity:"rare",weight:30},
    {rarity:"epic",weight:20},
    {rarity:"legendary",weight:9},
    {rarity:"artifact",weight:1}
  ];
  // 质量加成：提升高稀有度权重（最多提升100%的稀有度权重）
  if (qualityBonus > 0) {
    rates[1].weight += qualityBonus * 10;  // rare +10
    rates[2].weight += qualityBonus * 8;   // epic +8
    rates[3].weight += qualityBonus * 4;   // legendary +4
    rates[4].weight += qualityBonus * 1;   // artifact +1
  }
  var totalWeight = 0;
  rates.forEach(function(r){totalWeight += r.weight;});
  var rand = Math.random() * totalWeight;
  var acc = 0, selectedRarity = "common";
  for (var i = 0; i < rates.length; i++) {
    acc += rates[i].weight;
    if (rand < acc) { selectedRarity = rates[i].rarity; break; }
  }
  var pool = EQUIP_DB.filter(function(e){return e.rarity === selectedRarity;});
  return pool[Math.floor(Math.random() * pool.length)];
}

// ===== 掉落装备（挑战胜利）=====
function rollDrop(npc, player) {
  var drops = [];
  var npcPower = calcNPCPower(npc);
  var pPower = calcPlayerPower(player);
  var ratio = npcPower / pPower; // 对手相对强度

  // ===== NPC专属掉落（优先判定）=====
  // 每个NPC有自己的专属掉落列表，有固定概率掉落
  if (npc.specialDrops && npc.specialDrops.length > 0) {
    for (var s = 0; s < npc.specialDrops.length; s++) {
      var sd = npc.specialDrops[s];
      if (Math.random() < sd.chance) {
        var specialEq = EQUIP_DB.find(function(e){ return e.id === sd.itemId; });
        if (specialEq) drops.push(specialEq);
      }
    }
  }

  // ===== NPC身上装备掉落 =====
  // NPC 穿的装备有概率掉落，稀有度越高概率越低
  if (npc.defaultEquip && npc.defaultEquip.length > 0) {
    var dropChanceByRarity = {common: 0.3, rare: 0.15, epic: 0.08, legendary: 0.03, artifact: 0.01};
    // 精英怪掉落率 x1.5，英雄级 x2
    var tierMult = npc.tier === 'hero' ? 2 : (npc.tier === 'elite' ? 1.5 : 1);
    npc.defaultEquip.forEach(function(eid) {
      var eq = EQUIP_DB.find(function(e){ return e.id == eid; });
      if (!eq) return;
      var chance = (dropChanceByRarity[eq.rarity] || 0.05) * tierMult;
      // 已经在 specialDrops 里的不重复掉
      var alreadyInSpecial = false;
      if (npc.specialDrops) {
        npc.specialDrops.forEach(function(sd) {
          if (sd.itemId == eid) alreadyInSpecial = true;
        });
      }
      if (!alreadyInSpecial && Math.random() < chance) {
        drops.push(eq);
      }
    });
  }

  // ===== 百科全书掉落（5%概率，只有怪物掉落对应世界的百科）=====
  if (npc.type === "monster" && Math.random() < 0.05) {
    var worldEncyclopedia = {
      "哈利波特": 301,
      "魔戒": 302,
      "塞尔达传说": 303,
      "希腊神话": 304,
      "中国神话": 305,
      "北欧神话": 306,
      "魔兽世界": 307,
      "最终幻想": 308,
      "封神榜": 309,
      "我的世界": 310,
      "暗黑破坏神": 311,
      "西游记": 312,
      "亚瑟王传说": 313,
      "龙枪编年史": 314,
      "黑暗之魂": 315
    };
    var encyId = worldEncyclopedia[npc.world];
    if (encyId) {
      var encyEq = EQUIP_DB.find(function(e){ return e.id === encyId; });
      if (encyEq) drops.push(encyEq);
    }
  }

  // 掉落数量：1-3件，对手越强越可能多件
  var dropCount = 1;
  var r = Math.random();
  if (ratio >= 1.2 && r < 0.5) dropCount = 2;
  else if (ratio >= 1.0 && r < 0.3) dropCount = 2;
  else if (ratio < 1.0 && r < 0.15) dropCount = 2;
  if (ratio >= 1.5 && Math.random() < 0.3) dropCount = 3;

  // 基础掉落权重（比抽奖低，普通更多）
  // 抽奖: common40 rare30 epic20 legendary9 artifact1
  // 掉落: common60 rare25 epic10 legendary4 artifact1
  var baseRates = {common:60, rare:25, epic:10, legendary:4, artifact:1};
  // 抽奖上限
  var maxRates = {common:40, rare:30, epic:20, legendary:9, artifact:1};

  // 对手强度加成：ratio越高，稀有装备权重越高（向抽奖概率靠近）
  // ratio=1时用基础，ratio越大越接近上限
  var factor = Math.min(1, Math.max(0, (ratio - 0.8) / 1.2)); // 0~1

  var rates = {};
  var totalWeight = 0;
  ["common","rare","epic","legendary","artifact"].forEach(function(rarity) {
    rates[rarity] = baseRates[rarity] + (maxRates[rarity] - baseRates[rarity]) * factor;
    totalWeight += rates[rarity];
  });

  for (var i = 0; i < dropCount; i++) {
    var rand = Math.random() * totalWeight;
    var acc = 0, selectedRarity = "common";
    for (var j = 0; j < ["common","rare","epic","legendary","artifact"].length; j++) {
      var r2 = ["common","rare","epic","legendary","artifact"][j];
      acc += rates[r2];
      if (rand < acc) { selectedRarity = r2; break; }
    }
    
    // 构建候选池：应用等级偏差和世界过滤规则
    var npcLevel = calcNPCLevel(npc);
    var isHighRarity = selectedRarity === "artifact" || selectedRarity === "legendary" || selectedRarity === "epic";
    
    var pool = EQUIP_DB.filter(function(e) {
      if (e.rarity !== selectedRarity) return false;
      
      // 规则1：神话、传说、史诗装备只有相同世界的NPC掉落
      if (isHighRarity && e.world !== npc.world) return false;
      
      return true;
    });
    
    // 规则2：装备等级偏离NPC等级越多，掉率越低（加权随机）
    if (pool.length > 0) {
      // 计算每件装备的权重（基于等级差）
      var weightedPool = [];
      var totalWeight2 = 0;
      pool.forEach(function(eq) {
        var lvlDiff = Math.abs(eq.lvl - npcLevel);
        // 等级差0时权重1，每差1级权重*0.7，最低0.05
        var weight = Math.max(0.05, Math.pow(0.7, lvlDiff));
        weightedPool.push({eq: eq, weight: weight});
        totalWeight2 += weight;
      });
      
      // 加权随机选择
      var r3 = Math.random() * totalWeight2;
      var acc2 = 0;
      var selectedEq = weightedPool[0].eq;
      for (var k = 0; k < weightedPool.length; k++) {
        acc2 += weightedPool[k].weight;
        if (r3 < acc2) {
          selectedEq = weightedPool[k].eq;
          break;
        }
      }
      drops.push(selectedEq);
    }
  }

  return drops;
}

// ===== 每日对手 =====
function pickDailyOpponent() {
  var player = getPlayer();
  var pPower = calcPlayerPower(player);
  // 选一个与玩家战力相近的对手
  var candidates = NPC_DB.filter(function(n) {
    var np = calcNPCPower(n);
    var ratio = pPower / np;
    return ratio >= 0.5 && ratio <= 2.0;
  });
  if (candidates.length === 0) candidates = NPC_DB;
  return candidates[Math.floor(Math.random() * candidates.length)];
}

// 估算对某个NPC的胜率（基于伤害公式，不考虑暴击和随机波动）
function estimateWinRate(player, npc) {
  var pStats = getPlayerStats(player);
  var nStats = getNPCStats(npc);
  if (!nStats || nStats.hp <= 0) return 0.5;

  var pLvl = player.level;
  var nLvl = calcNPCLevel(npc);
  var lvlDiff = pLvl - nLvl;
  var lvlBonusPct = GAME_CONFIG.levelDamageBonus;
  var maxLvlBonus = GAME_CONFIG.maxLevelDamageBonus;
  var pLvlBonus = 1 + lvlDiff * lvlBonusPct;
  pLvlBonus = Math.max(1 - maxLvlBonus, Math.min(1 + maxLvlBonus, pLvlBonus));
  var nLvlBonus = 1 - lvlDiff * lvlBonusPct;
  nLvlBonus = Math.max(1 - maxLvlBonus, Math.min(1 + maxLvlBonus, nLvlBonus));

  var encyBonus = 1.0;
  if (hasWorldEncyclopedia(player, npc.world)) { encyBonus = 1.25; }

  // 玩家预期每回合伤害
  var pEffAtk = Math.max(pStats.atk * encyBonus, pStats.matk * encyBonus);
  var pIsMagic = (pStats.matk * encyBonus) > (pStats.atk * encyBonus);
  var pDefSide = pIsMagic ? nStats.mdef : nStats.def;
  var pDmg = Math.max(1, Math.floor(pEffAtk * GAME_CONFIG.damageAttackRatio - pDefSide * GAME_CONFIG.damageDefenseRatio));
  pDmg = Math.floor(pDmg * pLvlBonus);

  // NPC预期每回合伤害
  var nEffAtk = Math.max(nStats.atk, nStats.matk);
  var nIsMagic = nStats.matk > nStats.atk;
  var nDefSide = nIsMagic ? pStats.mdef * encyBonus : pStats.def * encyBonus;
  var nDmg = Math.max(1, Math.floor(nEffAtk * GAME_CONFIG.damageAttackRatio - nDefSide * GAME_CONFIG.damageDefenseRatio));
  nDmg = Math.floor(nDmg * nLvlBonus);

  if (pDmg <= 0 || nDmg <= 0) return 0.5;

  // 玩家先手，估算击杀所需回合数
  var pRounds = Math.ceil(nStats.hp / pDmg);
  var nRounds = Math.ceil(pStats.hp / nDmg);

  if (pRounds <= 1) return 0.99;
  if (nRounds <= 1) return 0.01;

  var diff = nRounds - pRounds;
  var total = Math.max(pRounds, nRounds);
  return Math.max(0.01, Math.min(0.99, 0.5 + 0.5 * (diff / total)));
}

// 被动应战：按胜率生成3个挑战者（约90%、50%、20%胜率）
// 优先选择等级接近玩家的 NPC（±3级以内）
function pickPassiveChallengers() {
  var player = getPlayer();
  var pLvl = player.level;

  // 计算所有NPC的胜率和等级差
  var rated = [];
  NPC_DB.forEach(function(n) {
    var wr = estimateWinRate(player, n);
    var nLvl = calcNPCLevel(n);
    var lvlDiff = Math.abs(pLvl - nLvl);
    rated.push({ npc: n, wr: wr, lvlDiff: lvlDiff });
  });

  // 目标胜率（从易到难：第一个90%+，第二个50%，第三个20%）
  var targets = [0.90, 0.50, 0.20];
  var selected = [];
  var usedIds = [];

  targets.forEach(function(target) {
    var best = null;
    var bestScore = Infinity;
    
    rated.forEach(function(item) {
      if (usedIds.indexOf(item.npc.id) >= 0) return;
      
      // 评分：胜率差距为主，等级差距为辅
      // 胜率差距是主要指标，等级差每级加0.05惩罚（在胜率接近时选等级更接近的）
      var wrDiff = Math.abs(item.wr - target);
      var lvlPenalty = item.lvlDiff * 0.05;
      var score = wrDiff + lvlPenalty;
      
      if (score < bestScore) {
        bestScore = score;
        best = item.npc;
      }
    });
    
    if (best) {
      selected.push(best);
      usedIds.push(best.id);
    }
  });

  // 兜底：不够3个就随机补
  while (selected.length < 3) {
    var fb = NPC_DB[Math.floor(Math.random() * NPC_DB.length)];
    if (usedIds.indexOf(fb.id) < 0) {
      selected.push(fb);
      usedIds.push(fb.id);
    }
  }
  return selected;
}

      "战斗持续了很久，最终双方都精疲力竭。这场对决以平局收场，你们互相致以敬意。",
      "难分胜负！"+nName+"退后一步，你也收起了武器。这场战斗让你们都学到了很多。",
      "旗鼓相当的对手！你们握手言和，约定下一次再战。这一战，没有输家。",
      "双方都伤痕累累，但眼神中都充满了尊重。"+nName+"点了点头，转身消失在光芒中。"
    ];
  } else if (ratio >= 0.5) {
    endings = [
      "最终，"+nName+"的力量压倒了你的防线。你被击退，但这场战斗让你看到了成长的方向。",
      "你输了，但并非毫无收获。"+nName+"的实力让你明白了自己需要变得更强。",
      nName+"取得了胜利，但你的勇气给对手留下了深刻印象。下次，你会更强。",
      "战斗结束，你没能战胜"+nName+"。但失败的滋味正是成长的催化剂，明天继续修炼！"
    ];
  } else {
    endings = [
      nName+"几乎不费吹灰之力就击败了你。但你知道，这只是暂时的——继续打卡，你会追上的。",
      "惨败。但这正是你需要的——看清差距，然后迎头赶上。继续努力，勇者！",
      nName+"甚至没有使出全力。你明白了，自己还有很长的路要走。但旅程才刚刚开始。",
      "你被轻松击败。"+nName+"给了你一个意味深长的眼神，似乎在说：等你变强了再来。"
    ];
  }

  var open = openings[Math.floor(Math.random() * openings.length)];
  var battle = battles[Math.floor(Math.random() * battles.length)];
  var end = endings[Math.floor(Math.random() * endings.length)];

  return open + "\n\n" + battle + "\n\n" + end;
}

// ===== 装备系统辅助函数 =====
function getMaxWeapons() { return 2; }
function getMaxAccessories(level) { return Math.min(6, 1 + Math.floor(level / 2)); }
function getArmorSlots() { return ["head", "body", "shield"]; }
function slotLabel(slot) {
  var map = {weapon:"武器", armor:"防具", accessory:"饰品", consumable:"消耗品", head:"头盔", body:"铠甲", shield:"盾牌"};
  return map[slot] || slot;
}

// 检查装备是否已穿戴
function isEquipped(player, itemId) {
  var eq = EQUIP_DB.find(function(e){return e.id==itemId;});
  if (!eq) return false;
  if (eq.type === "weapon") return player.equipped.weapons.indexOf(itemId) >= 0;
  if (eq.type === "armor") {
    for (var s in player.equipped.armor) {
      if (player.equipped.armor[s] === itemId) return true;
    }
    return false;
  }
  if (eq.type === "accessory") return player.equipped.accessories.indexOf(itemId) >= 0;
  return false;
}

// 检查是否可以装备（槽位是否已满）
// 知识典籍ID范围（全局定义）
var TOME_IDS = [301,302,303,304,305,306,307,308,309,310,311,312,313,314,315];
function isTome(eq) { return TOME_IDS.indexOf(eq.id) >= 0; }

function canEquipItem(player, item) {
  if (player.level < item.lvl) return false;
  if (!player.inventory[item.id] || player.inventory[item.id] <= 0) return false;
  if (isEquipped(player, item.id)) return false;
  // 知识典籍不能装备（只收集点亮，不占装备槽）
  if (TOME_IDS.indexOf(Number(item.id)) >= 0) return false;
  
  if (item.type === "weapon") {
    return player.equipped.weapons.length < getMaxWeapons();
  }
  if (item.type === "armor") {
    var slot = item.slot || "body";
    return player.equipped.armor[slot] === null;
  }
  if (item.type === "accessory") {
    return player.equipped.accessories.length < getMaxAccessories(player.level);
  }
  return false;
}

// ===== 装备/卸下 =====
function equipItem(itemId) {
  var player = getPlayer();
  var item = EQUIP_DB.find(function(e){return e.id==itemId;});
  if (!item) return;
  if (!canEquipItem(player, item)) {
    if (player.level < item.lvl) {
      showToast("需要等级 " + item.lvl + " 才能装备！");
    } else if (item.type === "weapon" && player.equipped.weapons.length >= getMaxWeapons()) {
      showToast("武器最多携带 " + getMaxWeapons() + " 件，请先卸下一件！");
    } else if (item.type === "armor") {
      showToast(slotLabel(item.slot||"body") + "已有装备，请先卸下！");
    } else if (item.type === "accessory") {
      showToast("饰品槽位已满（当前" + player.equipped.accessories.length + "/" + getMaxAccessories(player.level) + "），请先卸下！");
    }
    return;
  }
  
  // 装备（物品保留在背包中，只是标记为已装备状态）
  if (item.type === "weapon") {
    player.equipped.weapons.push(itemId);
  } else if (item.type === "armor") {
    var slot = item.slot || "body";
    player.equipped.armor[slot] = itemId;
  } else if (item.type === "accessory") {
    player.equipped.accessories.push(itemId);
  }
  
  savePlayer(player);
  addGrowthLog({
    date: todayStr(), icon:item.icon, 
    desc:"装备了 " + item.name + "（" + slotLabel(item.slot || item.type) + "）",
    gains: item.type==="weapon"?"ATK+"+(item.atk||0)+" MATK+"+(item.matk||0):
           item.type==="armor"?"DEF+"+(item.def||0)+" MDEF+"+(item.mdef||0):
           "全属性加成"
  });
  renderAll();
}

function unequipItem(itemId) {
  var player = getPlayer();
  var item = EQUIP_DB.find(function(e){return e.id==itemId;});
  if (!item) { showToast("装备不存在"); return; }
  if (!isEquipped(player, itemId)) { showToast("这件装备没有在装备栏"); return; }
  
  // 从装备栏移除（物品仍在背包中）
  if (item.type === "weapon") {
    var idx = player.equipped.weapons.indexOf(itemId);
    if (idx >= 0) player.equipped.weapons.splice(idx, 1);
  } else if (item.type === "armor") {
    for (var s in player.equipped.armor) {
      if (player.equipped.armor[s] === itemId) {
        player.equipped.armor[s] = null;
        break;
      }
    }
  } else if (item.type === "accessory") {
    var idx2 = player.equipped.accessories.indexOf(itemId);
    if (idx2 >= 0) player.equipped.accessories.splice(idx2, 1);
  }
  
  savePlayer(player);
  renderAll();
}

// ===== 降级兑换 =====
function exchangeDown(itemId) {
  var player = getPlayer();
  var item = EQUIP_DB.find(function(e){ return e.id == itemId; });
  if (!item) return;
  var count = player.inventory[itemId] || 0;
  if (count < 2) { showToast("数量不足，需要至少2件"); return; }
  if (item.rarity === "common") { showToast("普通装备无法继续降级"); return; }
  
  // 降一档
  var rarityOrder = ["artifact","legendary","epic","rare","common"];
  var idx = rarityOrder.indexOf(item.rarity);
  var nextRarity = rarityOrder[idx + 1] || "common";
  
  if (!confirm("用1件「" + item.name + "」（" + rarityName(item.rarity) + "）兑换1件随机" + rarityName(nextRarity) + "装备？")) {
    return;
  }
  
  // 扣1件
  player.inventory[itemId]--;
  if (player.inventory[itemId] <= 0) delete player.inventory[itemId];
  
  // 随机获得低一档装备
  var pool = EQUIP_DB.filter(function(e){ return e.rarity === nextRarity; });
  var newItem = pool[Math.floor(Math.random() * pool.length)];
  player.inventory[newItem.id] = (player.inventory[newItem.id] || 0) + 1;
  
  savePlayer(player);
  addGrowthLog({
    date: todayStr(), icon:"🔄",
    desc:"降级兑换：" + item.name + " → " + newItem.name,
    gains: rarityName(nextRarity) + "装备 +1"
  });
  showToast("兑换成功！获得 " + rarityName(nextRarity) + " 装备：" + newItem.name);
  renderAll();
}

// ===== 装备价格计算 =====
// 出售价格：普通10, 稀有30, 史诗90, 传说270, 神器810 (每级差3倍)
// 解锁价格 = 出售价格 × 3
function getEquipSellPrice(rarity) {
  var prices = {common:10, rare:30, epic:90, legendary:270, artifact:810};
  return prices[rarity] || 10;
}
function getEquipUnlockPrice(rarity) {
  return getEquipSellPrice(rarity) * 3;
}

// ===== 出售装备 =====
function sellItem(itemId) {
  var player = getPlayer();
  var item = EQUIP_DB.find(function(e){ return e.id == itemId; });
  if (!item) return;
  var count = player.inventory[itemId] || 0;
  if (count < 1) { showToast("没有这件装备"); return; }
  
  var sellPrice = getEquipSellPrice(item.rarity);
  var msg = "出售1件「" + item.name + "」（" + rarityName(item.rarity) + "）？\n获得 💰" + sellPrice + " 金币";
  if (count === 1) {
    msg += "\n\n⚠️ 警告：这是最后一件！出售后将不再拥有。";
  }
  if (!confirm(msg)) {
    return;
  }
  
  // 扣1件
  player.inventory[itemId]--;
  if (player.inventory[itemId] <= 0) delete player.inventory[itemId];
  
  // 如果装备着，先卸下
  if (isEquipped(player, itemId)) {
    if (item.type === "weapon") {
      var idx = player.equipped.weapons.indexOf(itemId);
      if (idx >= 0) player.equipped.weapons.splice(idx, 1);
    } else if (item.type === "armor") {
      for (var s in player.equipped.armor) {
        if (player.equipped.armor[s] === itemId) {
          player.equipped.armor[s] = null;
          break;
        }
      }
    } else if (item.type === "accessory") {
      var idx2 = player.equipped.accessories.indexOf(itemId);
      if (idx2 >= 0) player.equipped.accessories.splice(idx2, 1);
    }
  }
  
  // 加金币
  player.gold = (player.gold || 0) + sellPrice;
  
  savePlayer(player);
  addGrowthLog({
    date: todayStr(), icon:"💰",
    desc:"出售：" + item.name,
    gains: "金币 +" + sellPrice
  });
  showToast("出售成功！获得 💰" + sellPrice + " 金币");
  renderAll();
}

// ===== 金币解锁装备 =====
function unlockItem(itemId) {
  var player = getPlayer();
  var item = EQUIP_DB.find(function(e){ return e.id == itemId; });
  if (!item) return;
  var owned = player.inventory[itemId] || 0;
  if (owned > 0) { showToast("已经拥有这件装备了"); return; }
  
  var price = getEquipUnlockPrice(item.rarity);
  var gold = player.gold || 0;
  if (gold < price) { showToast("金币不足，需要 💰" + price + " 金币"); return; }
  
  if (!confirm("花费 💰" + price + " 金币解锁「" + item.name + "」（" + rarityName(item.rarity) + "）？")) {
    return;
  }
  
  // 扣金币
  player.gold = gold - price;
  
  // 加装备
  player.inventory[item.id] = (player.inventory[item.id] || 0) + 1;
  
  savePlayer(player);
  addGrowthLog({
    date: todayStr(), icon:"🔓",
    desc:"解锁装备：" + item.name,
    gains: "金币 -" + price
  });
  showToast("解锁成功！获得 " + rarityName(item.rarity) + " 装备：" + item.name);
  renderAll();
}

// ===== 使用消耗品 =====
function useConsumable(itemId) {
  var player = getPlayer();
  var item = EQUIP_DB.find(function(e){ return e.id == itemId; });
  if (!item || item.type !== "consumable") return;
  var count = player.inventory[itemId] || 0;
  if (count <= 0) { showToast("没有这个道具了"); return; }
  
  if (!confirm("使用1个「" + item.name + "」？\n效果：" + item.effect)) {
    return;
  }
  
  // 扣1个
  player.inventory[itemId]--;
  if (player.inventory[itemId] <= 0) delete player.inventory[itemId];
  
  // 永久增加属性（叠加到基础属性）
  var gains = [];
  if (item.atk) { player.atk += item.atk; gains.push("ATK+" + item.atk); }
  if (item.def) { player.def += item.def; gains.push("DEF+" + item.def); }
  if (item.matk) { player.matk += item.matk; gains.push("MATK+" + item.matk); }
  if (item.mdef) { player.mdef += item.mdef; gains.push("MDEF+" + item.mdef); }
  if (item.hpBonus) { player.hp += item.hpBonus; gains.push("HP+" + item.hpBonus); }
  if (item.mpBonus) { player.mp += item.mpBonus; gains.push("MP+" + item.mpBonus); }
  
  savePlayer(player);
  addGrowthLog({
    date: todayStr(), icon: item.icon,
    desc:"使用了 " + item.name,
    gains: gains.join(" ")
  });
  showToast("使用成功！" + gains.join(" "));
  renderAll();
}

// ===== 辅助 =====
function rarityName(r) {
  var map = {artifact:"神话",legendary:"传说",epic:"史诗",rare:"稀有",common:"普通"};
  return map[r] || r;
}
function typeLabel(t) {
  if (t==="hero") return "英雄";
  if (t==="villain") return "反派";
  if (t==="monster") return "怪物";
  if (t==="normal") return "人物";
  return t;
}
function tierLabel(t) {
  var map = {hero:"英雄级",elite:"精英级",common:"普通级"};
  return map[t] || t;
}

function showToast(msg) {
  var t = document.createElement("div");
  t.className = "toast";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){t.remove();}, 2500);
}

  if (x + tw > window.innerWidth - 10) x = event.clientX - tw - 15;
  if (y + th > window.innerHeight - 10) y = event.clientY - th - 15;

function hideEquipTooltip() {

}

  document.querySelectorAll(".nav-btn").forEach(function(b){b.classList.remove("active");});
  var panel = document.getElementById("panel-"+name);

  html += renderArena(player);
  html += '</div>';

  // 被动应战
  var passive = getPassiveBattle();
  if (passive) {
    html += renderPassiveBattle(player, passive);
  }

  // 主动挑战
  html += renderActiveChallenge(player);

  document.getElementById("homeContent").innerHTML = html;
}

function renderArena(player) {
  var pPower = calcPlayerPower(player);
  var wins = [], draws = [], loses = [];
  var farStronger = 0; // 远超50%以上的对手数

  NPC_DB.forEach(function(npc) {
    var np = calcNPCPower(npc);
    var ratio = pPower / np;
    var entry = {name:npc.name, icon:npc.icon, world:npc.world, power:np, type:npc.type, gap:Math.abs(Math.round((1-ratio)*100))};
    if (ratio >= 1.2) wins.push(entry);
    else if (ratio >= 0.7) draws.push(entry);
    else if (ratio >= 0.5) loses.push(entry); // 只显示差距≤50%的
    else farStronger++;
  });

  wins.sort(function(a,b){return b.power - a.power;});
  draws.sort(function(a,b){return b.power - a.power;});
  loses.sort(function(a,b){return a.power - b.power;});

  var html = '<div class="arena-result">';
  html += '<div class="arena-col win"><h3>🏆 碾压（'+wins.length+'人）</h3>';
  wins.slice(0,8).forEach(function(n){
    html += '<div class="opp-row"><span class="opp-icon">'+n.icon+'</span><span class="opp-name">'+n.name+'</span><span class="opp-power">'+n.power+'</span></div>';
  });
  if (wins.length > 8) html += '<div class="opp-row" style="color:var(--muted);justify-content:center;">...还有 '+(wins.length-8)+' 人</div>';
  html += '</div>';

  html += '<div class="arena-col draw"><h3>⚔️ 势均力敌（'+draws.length+'人）</h3>';
  draws.slice(0,8).forEach(function(n){
    html += '<div class="opp-row"><span class="opp-icon">'+n.icon+'</span><span class="opp-name">'+n.name+'</span><span class="opp-power">'+n.power+'</span><span class="opp-gap" style="color:var(--draw)">差'+n.gap+'%</span></div>';
  });
  if (draws.length > 8) html += '<div class="opp-row" style="color:var(--muted);justify-content:center;">...还有 '+(draws.length-8)+' 人</div>';
  html += '</div>';

  html += '<div class="arena-col lose"><h3>💀 难以战胜（'+loses.length+'人）</h3>';
  loses.slice(0,8).forEach(function(n){
    html += '<div class="opp-row"><span class="opp-icon">'+n.icon+'</span><span class="opp-name">'+n.name+'</span><span class="opp-power">'+n.power+'</span><span class="opp-gap" style="color:var(--lose)">差'+n.gap+'%</span></div>';
  });
  if (loses.length > 8) html += '<div class="opp-row" style="color:var(--muted);justify-content:center;">...还有 '+(loses.length-8)+' 人</div>';
  if (farStronger > 0) html += '<div class="opp-row" style="color:var(--muted);justify-content:center;font-size:18px;">🔒 还有 '+farStronger+' 人战力远超你</div>';
  html += '</div>';
  html += '</div>';

  return html;
}

// ===== 挑战内联装备调整 =====
function renderEquipInline(player) {
  var maxWeapons = getMaxWeapons();
  var maxAcc = getMaxAccessories(player.level);

  var html = '<div class="equip-inline" style="margin:10px 0;padding:10px;background:var(--bg);border-radius:8px;border:1px solid var(--rule);">';
  html += '<div style="font-size:18px;font-weight:700;color:var(--gold);margin-bottom:8px;">🎒 装备调整</div>';

  function renderSlot(label, equippedIds, maxCount, filterType, filterSlot) {
    if (!Array.isArray(equippedIds)) equippedIds = equippedIds ? [equippedIds] : [];
    var s = '<div style="margin-bottom:6px;">';
    s += '<div style="font-size:18px;color:var(--muted);margin-bottom:3px;">'+label+' ('+equippedIds.length+'/'+maxCount+')</div>';
    s += '<div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:3px;">';
    equippedIds.forEach(function(id) {
      if (!id) return;
      var eq = EQUIP_DB.find(function(e){ return e.id == id; });
      if (!eq) return;
      var canUse = canUseEquip(eq, player.level);
      s += '<span style="display:inline-flex;align-items:center;gap:2px;padding:2px 6px;background:var(--bg2);border-radius:5px;font-size:18px;border:1px solid '+(canUse?'var(--gold)':'var(--rule)')+';'+(canUse?'':'opacity:0.6')+';cursor:help;" onmouseenter="showEquipTooltip('+id+',event)" onmouseleave="hideEquipTooltip()">';
      s += eq.icon + ' ' + eq.name;
      s += ' <span onclick="event.stopPropagation();unequipItem('+id+')" style="cursor:pointer;color:#e0526a;font-size:18px;" title="卸下">✕</span>';
      s += '</span>';
    });
    for (var i = equippedIds.length; i < maxCount; i++) {
      s += '<span style="display:inline-flex;align-items:center;padding:2px 6px;background:var(--bg2);border-radius:5px;font-size:18px;border:1px dashed var(--rule);color:var(--muted);">空</span>';
    }
    s += '</div>';

    var avail = [];
    for (var idStr in player.inventory) {
      var id = Number(idStr);
      var eq = EQUIP_DB.find(function(e){ return e.id == id; });
      if (!eq) continue;
      if (eq.type === "consumable" || TOME_IDS.indexOf(id) >= 0) continue;
      if (filterType === "armor" && eq.type !== "armor") continue;
      if (filterType === "weapon" && eq.type !== "weapon") continue;
      if (filterType === "accessory" && eq.type !== "accessory") continue;
      if (filterType === "armor" && filterSlot && eq.slot !== filterSlot) continue;
      if (isEquipped(player, id)) continue;
      if ((player.inventory[idStr] || 0) <= 0) continue;
      if (filterType === "armor" && filterSlot === "body" && !eq.slot) continue;
      avail.push(eq);
    }

    if (avail.length > 0) {
      s += '<div style="display:flex;gap:2px;flex-wrap:wrap;">';
      avail.forEach(function(eq) {
        var canEquip = player.level >= eq.lvl;
        var hasSlot = (filterType === "weapon" && player.equipped.weapons.length < maxWeapons) ||
                      (filterType === "armor" && (!filterSlot || player.equipped.armor[filterSlot] === null)) ||
                      (filterType === "accessory" && player.equipped.accessories.length < maxAcc);
        var canClick = canEquip && hasSlot;
        s += '<span onclick="'+(canClick?'equipItem('+eq.id+')':'')+'" onmouseenter="showEquipTooltip('+eq.id+',event)" onmouseleave="hideEquipTooltip()" style="display:inline-flex;align-items:center;gap:2px;padding:1px 5px;border-radius:3px;font-size:18px;cursor:'+(canClick?'pointer':'help')+';border:1px solid '+(canClick?'var(--gold)':'rgba(200,200,200,0.3)')+';opacity:'+(canClick?'1':'0.4')+';background:'+(canClick?'rgba(255,215,0,0.08)':'transparent')+';">';
        s += eq.icon + ' ' + eq.name;
        if (!canEquip) s += ' 🔒'+eq.lvl;
        s += '</span>';
      });
      s += '</div>';
    }
    s += '</div>';
    return s;
  }

  html += renderSlot("⚔️ 武器", player.equipped.weapons, maxWeapons, "weapon");
  var armorSlots = [{key:"head", label:"🪖 头盔"},{key:"body", label:"👕 铠甲"},{key:"shield", label:"🛡️ 盾牌"}];
  armorSlots.forEach(function(slot) {
    var eqId = player.equipped.armor[slot.key] || null;
    html += renderSlot(slot.label, eqId ? [eqId] : [], 1, "armor", slot.key);
  });
  html += renderSlot("💍 饰品", player.equipped.accessories, maxAcc, "accessory");

  var conCount = 0;
  for (var idStr in player.inventory) {
    var eq = EQUIP_DB.find(function(e){ return e.id == Number(idStr); });
    if (eq && eq.type === "consumable") conCount += player.inventory[idStr];
  }
  if (conCount > 0) {
    html += '<div style="font-size:18px;color:var(--muted);margin-top:4px;">💊 消耗品 '+conCount+' 件（战斗自动使用不同类型各1件）</div>';
  }

  html += '</div>';
  return html;
}

      html += '</div>';
    });
    html += '</div></div>';
  }
  
  html += '</div>';
  return html;
}

// ===== 执行被动应战 =====
function doPassiveBattle(idx) {
  var player = getPlayer();
  var opp = getPassiveBattle();
  if (!opp || opp.completed) return;
  if (!opp.options || !opp.options[idx]) return;

  var npc = opp.options[idx];
  opp.npc = npc;
  opp.selectedIndex = idx;
  
  // 战斗中消耗消耗品
  var usedItem = consumeForBattle(player);
  
  // 回合制战斗
  var battle = runBattle(player, npc, usedItem);
  var result = battle.winner === "player" ? "win" : (battle.winner === "npc" ? "lose" : "draw");
  
  // 胜利后有概率掉落装备（比每日挑战略低）
  var drops = [];
  if (result === "win") {
    drops = rollDrop(npc, player); // 每日挑战同款掉落规则
  }
  
  // 将掉落加入背包
  drops.forEach(function(item) {
    player.inventory[item.id] = (player.inventory[item.id] || 0) + 1;
  });
  
  // 战斗获得经验（被动应战）
  var xpGain = 0;
  if (result === "win") {
    var nLvl = calcNPCLevel(npc);
    var lvlDiff = nLvl - player.level;
    xpGain = GAME_CONFIG.xpPassiveWin + Math.max(0, lvlDiff) * GAME_CONFIG.xpPerLevelDiff;
    gainXP(player, xpGain);
  } else if (result === "draw") {
    xpGain = GAME_CONFIG.xpDraw;
    gainXP(player, xpGain);
  }
  
  // 保存结果
  opp.completed = true;
  opp.result = result;
  opp.usedItem = usedItem;
  opp.battle = battle;
  opp.drops = drops;
  savePassiveBattle(opp);
  
  savePlayer(player);
  
  var gainText = result==="win"?"🏆 胜利":result==="draw"?"🏳️ 平局":"💀 败北";
  if (usedItem && usedItem.length > 0) gainText += " · 用掉"+usedItem.length+"件消耗品";
  if (xpGain > 0) gainText += " · 经验+"+xpGain;
  
  addGrowthLog({
    date: todayStr(), icon:npc.icon, desc:"被动应战 " + npc.name + "（" + npc.world + "）",
    gains: gainText
  });
  
  renderAll();
  showToast(result==="win" ? "🏆 应战成功！" : result==="draw" ? "🏳️ 打成平手" : "💀 应战失败...");
}

// ===== 避战 =====
function avoidPassiveBattle() {
  var player = getPlayer();
  var opp = getPassiveBattle();
  if (!opp || opp.completed) return;
  
  opp.completed = true;
  opp.result = "avoid";
  opp.usedItem = null;
  opp.drops = [];
  savePassiveBattle(opp);
  
  var npcName = opp.npc ? opp.npc.name + "（" + opp.npc.world + "）" : "挑战者";
  addGrowthLog({
    date: todayStr(), icon:"🏃", desc:"避战 " + npcName,
    gains: "选择避战，未获奖励"
  });

// ===== 执行每日挑战 =====
function doDailyBattle() {
  var player = getPlayer();
  var dailyOpp = getDailyOpponent();
  if (!dailyOpp || dailyOpp.completed) return;
  
  var npc = dailyOpp.npc;
  
  // 战斗中消耗消耗品
  var usedItem = consumeForBattle(player);
  
  // 回合制战斗
  var battle = runBattle(player, npc, usedItem);
  var result = battle.winner === "player" ? "win" : (battle.winner === "npc" ? "lose" : "draw");
  
  // 胜利掉落装备
  var drops = [];
  if (result === "win") {
    drops = rollDrop(npc, player);
    drops.forEach(function(item) {
      player.inventory[item.id] = (player.inventory[item.id] || 0) + 1;
    });
  }
  
  // 战斗获得经验（每日挑战）
  var xpGain = 0;
  if (result === "win") {
    var nLvl = calcNPCLevel(npc);
    var lvlDiff = nLvl - player.level;
    xpGain = GAME_CONFIG.xpDailyWin + Math.max(0, lvlDiff) * GAME_CONFIG.xpPerLevelDiff;
    gainXP(player, xpGain);
  } else if (result === "draw") {
    xpGain = GAME_CONFIG.xpDraw;
    gainXP(player, xpGain);
  }
  
  // 更新每日挑战状态
  dailyOpp.completed = true;
  dailyOpp.result = result;
  dailyOpp.usedItem = usedItem;
  dailyOpp.drops = drops;
  dailyOpp.battle = battle;
  saveDailyOpponent(dailyOpp);
  savePlayer(player);
  
  var gainText = result==="win"?"🏆 胜利":result==="draw"?"🏳️ 平局":"💀 败北";
  if (usedItem && usedItem.length > 0) gainText += " · 用掉" + usedItem.length + "件消耗品";
  if (drops.length > 0) {
    gainText += " · 掉落:" + drops.length + "件";
  }
  if (xpGain > 0) gainText += " · 经验+" + xpGain;
  
  addGrowthLog({
    date: todayStr(), icon: npc.icon,
    desc: "今日挑战：" + npc.name + "（" + npc.world + "）",
    gains: gainText
  });
  
  renderAll();
  showToast(result==="win" ? ("胜利！获得" + drops.length + "件装备") : result==="draw" ? "平局！" : "败北...");
}

// ===== 战斗中消耗消耗品 =====
// 消耗品分类：生命类、法力类、力量类，每类最多用1件（取最强的）
function getConsumableCategory(item) {
  if (item.hpBonus && item.hpBonus > 0 && !item.mpBonus && !item.atk && !item.def) return "hp";
  if (item.mpBonus && item.mpBonus > 0 && !item.hpBonus && !item.matk && !item.mdef) return "mp";
  return "power"; // 攻防类/全属性类
}

function consumeForBattle(player) {
  // 找出所有消耗品
  var consumables = [];
  for (var id in player.inventory) {
    if (player.inventory[id] > 0) {
      var eq = EQUIP_DB.find(function(e){ return e.id == id; });
      if (eq && eq.type === "consumable") {
        consumables.push(eq);
      }
    }
  }
  if (consumables.length === 0) return [];
  
  // 按类别分组，每类选最强的1件
  var bestByCat = {hp: null, mp: null, power: null};
  consumables.forEach(function(item) {
    var cat = getConsumableCategory(item);
    var power = (item.hpBonus||0) + (item.mpBonus||0) + (item.atk||0) + (item.def||0) + (item.matk||0) + (item.mdef||0);
    if (!bestByCat[cat] || power > bestByCat[cat]._power) {
      bestByCat[cat] = item;
      bestByCat[cat]._power = power;
    }
  });
  
  // 消耗每类选中的物品
  var usedItems = [];
  for (var cat in bestByCat) {
    var item = bestByCat[cat];
    if (item) {
      usedItems.push(item);
      player.inventory[item.id]--;
      if (player.inventory[item.id] <= 0) delete player.inventory[item.id];
    }
  }
  
  return usedItems;
}

// ===== 主动挑战 =====
function doChallenge() {
  var sel = document.getElementById("challengeSelect");
  var npcId = sel.value;
  if (!npcId) { showToast("请先选择一位对手！"); return; }
  var npc = NPC_DB.find(function(n){return n.id==npcId;});
  if (!npc) return;
  
  // 检查每日次数（超次数也可以打，但没有奖励）
  var remaining = getActiveChallengeRemaining();
  var hasReward = remaining > 0;
  
  var player = getPlayer();
  
  // 战斗中消耗消耗品（仅在有奖励时消耗）
  var usedItem = hasReward ? consumeForBattle(player) : null;
  
  // 回合制战斗
  var battle = runBattle(player, npc, usedItem);
  var result = battle.winner === "player" ? "win" : (battle.winner === "npc" ? "lose" : "draw");
  var resultText = result==="win"?"🏆 胜利！":"🏳️ 平局！";
  if (result==="lose") resultText = "💀 败北...";
  if (!hasReward) resultText += "（无奖励）";

  // 胜利掉落装备（仅在有奖励次数时）
  var drops = [];
  if (result === "win" && hasReward) {
    drops = rollDrop(npc, player);
    drops.forEach(function(item) {
      player.inventory[item.id] = (player.inventory[item.id] || 0) + 1;
    });
  }

  // 战斗获得经验（仅在有奖励次数时）
  var xpGain = 0;
  if (hasReward) {
    if (result === "win") {
      var nLvl = calcNPCLevel(npc);
      var lvlDiff = nLvl - player.level;
      xpGain = GAME_CONFIG.xpActiveWin + Math.max(0, lvlDiff) * GAME_CONFIG.xpPerLevelDiff;
      gainXP(player, xpGain);
    } else if (result === "draw") {
      xpGain = GAME_CONFIG.xpDraw;
      gainXP(player, xpGain);
    }
  }

  // 缓存结果供渲染使用
  _cache.activeChallengeResult = {
    npc: npc,
    result: result,
    resultText: resultText,
    usedItem: usedItem,
    npcId: npcId,
    battle: battle,
    drops: drops,
    xpGain: xpGain,
    hasReward: hasReward
  };
  
  // 保存（消耗品已扣）
  savePlayer(player);
  
  // 消耗一次主动挑战次数（仅在有奖励时消耗次数）
  if (hasReward) {
    useActiveChallenge();
  }
  
  var gainText = resultText;
  if (usedItem && usedItem.length > 0) gainText += " · 用掉" + usedItem.length + "件消耗品";
  if (drops.length > 0) gainText += " · 掉落" + drops.length + "件";
  if (xpGain > 0) gainText += " · 经验+" + xpGain;
  if (!hasReward) gainText += "（练习模式，无奖励）";
  
  addGrowthLog({
    date: todayStr(), icon:npc.icon, desc:"主动挑战 " + npc.name + "（" + npc.world + "）" + (hasReward?"":"[练习]"),
    gains: gainText
  });
  renderAll();
  showToast(resultText);
}

        if (eq.mpBonus) h += '<span class="ec-stat mp">💧'+eq.mpBonus+'</span>';
        h += '</div>';
        h += '<div class="ec-req">等级要求：Lv.'+eq.lvl+' '+(player.level >= eq.lvl?'<span style="color:#50c878">✓ 已满足</span>':'<span style="color:#e0526a">✗ 不足</span>')+'</div>';

          h += '<span class="ec-btn unequip" onclick="unequipItem('+eq.id+')">✓ 已装备 · 点击卸下</span>';

          h += '<span class="ec-btn equip-btn" onclick="equipItem('+eq.id+')">⬆ 装备</span>';

          h += '<span class="ec-btn locked">🔒 槽位已满</span>';
        }
        // 出售（所有装备都可以出售）
        var sellPrice = getEquipSellPrice(eq.rarity);

        h += '</div>';
        h += '</div>';
      });
      h += '</div>';
      h += '</div>';
      return h;
    }
    
    html += renderGroup('武器', '⚔️', weapons);
    html += renderGroup('防具', '🛡️', armors);
    html += renderGroup('饰品', '💍', accessories);

  html += '</div>';

      html += '<div class="tome-effect">✨ '+tome.effect+'</div>';
      html += '</div>';

    html += '</div>';

  html += '</div>';

  // ===== 装备图鉴（下方）=====
  // 图鉴筛选计算（放在前面，标题要用）

  var encWorld = _cache.encFilter.world;
  var encLvl = _cache.encFilter.lvl;
  
  var encFiltered = allItems.slice();
  if (encRarity !== "all") encFiltered = encFiltered.filter(function(e){return e.rarity===encRarity;});
  if (encWorld !== "all") encFiltered = encFiltered.filter(function(e){return e.world===encWorld;});
  if (encLvl !== "all") encFiltered = encFiltered.filter(function(e){return e.lvl <= parseInt(encLvl);});
  
  var allWorlds2 = [];
  EQUIP_DB.forEach(function(e){ if (allWorlds2.indexOf(e.world) < 0) allWorlds2.push(e.world); });
  allWorlds2.sort();
  
  html += '<div class="equip-section encyclopedia-section">';
  html += '<h3 class="section-title">📖 装备图鉴（' + encFiltered.length + '/' + allItems.length + '件）</h3>';
  
  // 图鉴筛选器UI

  html += '<select onchange="filterEncyclopedia(\'lvl\',this.value,this)" style="padding:4px 8px;border-radius:6px;border:1px solid var(--rule);background:var(--bg);color:var(--ink);font-size:16px;">';
  html += '<option value="all"'+(encLvl==='all'?' selected':'')+'>全部等级</option>';

  html += '</select>';
  html += '</div></div>';
  
  // 按部位分组
  var encWeapons = encFiltered.filter(function(e){ return e.type === "weapon"; });
  var encArmors = encFiltered.filter(function(e){ return e.type === "armor"; });
  var encAccessories = encFiltered.filter(function(e){ return e.type === "accessory" && !isTome(e); });
  var encConsumables = encFiltered.filter(function(e){ return e.type === "consumable"; });
  
  // 每组内按稀有度排序
  encWeapons.sort(function(a,b){ return raritySort(a.rarity) - raritySort(b.rarity); });
  encArmors.sort(function(a,b){ return raritySort(a.rarity) - raritySort(b.rarity); });
  encAccessories.sort(function(a,b){ return raritySort(a.rarity) - raritySort(b.rarity); });
  encConsumables.sort(function(a,b){ return raritySort(a.rarity) - raritySort(b.rarity); });
  
  function renderEncyclopediaGroup(title, icon, items) {
    if (items.length === 0) return '';
    var ownedCount = items.filter(function(e){ return (player.inventory[e.id]||0) > 0; }).length;
    var h = '<div style="margin-bottom:16px;">';
    h += '<div style="font-size:20px;color:var(--gold);font-weight:700;margin-bottom:8px;padding-left:4px;">' + icon + ' ' + title + '（' + ownedCount + '/' + items.length + '）</div>';
    h += '<div class="equip-grid">';
    items.forEach(function(eq) {
      var owned = player.inventory[eq.id] || 0;
      var canEquip = player.level >= eq.lvl;
      var slotName = eq.type === "armor" ? slotLabel(eq.slot || "body") : slotLabel(eq.type);
      h += '<div class="equip-card '+eq.rarity+(owned > 0 ? ' owned' : ' not-owned')+'">';
      h += '<div class="ec-header">';
      h += '<div class="ec-icon">'+(owned > 0 ? eq.icon : '❓')+'</div>';
      h += '<div class="ec-info">';
      h += '<div class="ec-name">'+(owned > 0 ? eq.name : '???')+'</div>';
      h += '<div class="ec-type">'+rarityName(eq.rarity)+' · '+slotName+' · Lv.'+eq.lvl+'</div>';
      h += '</div></div>';
      h += '<div class="ec-stats">';

        if (eq.atk) h += '<span class="ec-stat atk">⚔'+eq.atk+'</span>';
        if (eq.matk) h += '<span class="ec-stat matk">🔮'+eq.matk+'</span>';
        if (eq.def) h += '<span class="ec-stat def">🛡'+eq.def+'</span>';
        if (eq.mdef) h += '<span class="ec-stat mdef">✨'+eq.mdef+'</span>';
        if (eq.hpBonus) h += '<span class="ec-stat hp">❤'+eq.hpBonus+'</span>';
        if (eq.mpBonus) h += '<span class="ec-stat mp">💧'+eq.mpBonus+'</span>';
      } else {
        h += '<span style="color:var(--muted);font-size:18px;">属性未知</span>';
      }
      h += '</div>';
      h += '<div class="ec-req">等级要求：Lv.'+eq.lvl+' '+(canEquip?'<span style="color:#50c878">✓</span>':'<span style="color:#e0526a">✗</span>')+'</div>';
      h += '<div class="ec-effect">'+(owned > 0 ? '✨ '+eq.effect : '🔒 获得后解锁详情')+'</div>';
      h += '<div class="ec-actions" style="flex-direction:column;gap:4px;">';
      if (owned > 0) {
        h += '<span class="ec-btn active">已获得 ×'+owned+'</span>';
      } else {
        var unlockPrice = getEquipUnlockPrice(eq.rarity);
        var canUnlock = (player.gold || 0) >= unlockPrice;
        h += '<span style="font-size:18px;color:var(--muted);text-align:center;">未获得</span>';
        if (canUnlock) {
          h += '<span class="ec-btn equip-btn" onclick="unlockItem('+eq.id+')">🔓 解锁 💰'+unlockPrice+'</span>';
        } else {
          var short = unlockPrice - (player.gold || 0);
          h += '<span class="ec-btn locked" onclick="showToast(\'金币不足，还差 💰\'+short+\' 金币\')">🔓 解锁 💰'+unlockPrice+'</span>';
        }
      }
      h += '</div>';
      h += '</div>';
    });
    h += '</div>';
    h += '</div>';
    return h;
  }
  
  html += renderEncyclopediaGroup('武器', '⚔️', encWeapons);
  html += renderEncyclopediaGroup('防具', '🛡️', encArmors);
  html += renderEncyclopediaGroup('饰品', '💍', encAccessories);
  html += renderEncyclopediaGroup('消耗品', '💊', encConsumables);
  
  html += '</div>';

  // ===== 图例说明 =====
  html += '<div class="legend-section">';
  html += '<h4 class="legend-title">📌 图例说明</h4>';
  html += '<div class="legend-grid">';
  html += '<div class="legend-item"><span class="legend-dot legendary"></span>传说装备（最强）</div>';
  html += '<div class="legend-item"><span class="legend-dot epic"></span>史诗装备（稀有）</div>';
  html += '<div class="legend-item"><span class="legend-dot rare"></span>稀有装备（不错）</div>';
  html += '<div class="legend-item"><span class="legend-dot uncommon"></span>优秀装备（常见）</div>';
  html += '<div class="legend-item"><span class="legend-dot common"></span>普通装备（基础）</div>';
  html += '<div class="legend-item"><span class="legend-icon">⚔</span>攻击力</div>';
  html += '<div class="legend-item"><span class="legend-icon">🛡</span>防御力</div>';
  html += '<div class="legend-item"><span class="legend-icon">🔮</span>魔法攻击</div>';
  html += '<div class="legend-item"><span class="legend-icon">✨</span>魔法防御</div>';
  html += '<div class="legend-item"><span class="legend-icon">❤</span>生命值</div>';
  html += '<div class="legend-item"><span class="legend-icon">💧</span>法力值</div>';
  html += '<div class="legend-item"><span class="legend-icon">🔒</span>等级不足无法启用</div>';
  html += '</div>';
  html += '<div style="margin-top:12px;padding-top:10px;border-top:1px dashed var(--rule);">';
  html += '<h4 class="legend-title">📋 装备栏位规则</h4>';
  html += '<div style="font-size:18px;color:var(--muted);line-height:1.8;">';
  html += '• <b>武器</b>：最多携带 2 件，攻击力全部叠加<br>';
  html += '• <b>防具</b>：分头盔、铠甲、盾牌 3 类，每类可装备 1 件<br>';
  html += '• <b>饰品</b>：数量上限随等级提升（1级1件，每2级+1，最多6件）<br>';
  html += '• <b>消耗品</b>：战斗中自动使用，生命类、法力类、力量类各 1 件（取最强的）';
  html += '</div></div>';
  html += '<div style="margin-top:12px;padding-top:10px;border-top:1px dashed var(--rule);">';
  html += '<h4 class="legend-title">💰 金币系统</h4>';
  html += '<div style="font-size:18px;color:var(--muted);line-height:1.8;">';
  html += '• <b>出售</b>：所有装备都可以出售换取金币，最后一件会有警告提示<br>';
  html += '• <b>解锁</b>：金币可以解锁图鉴中未获得的装备<br>';

  document.getElementById("equipList").innerHTML = html;
}

function raritySort(r) {
  var order = {legendary:0, epic:1, rare:2, uncommon:3, common:4};
  return order[r] || 99;
}

// ===== NPC 图鉴面板 =====
function renderNPCPanel() {
  var player = getPlayer();
  var activeFilter = document.querySelector("#npcFilters .filter-chip.active");
  var filterType = activeFilter ? activeFilter.dataset.npcType : "all";
  var worldSel = document.getElementById("npcWorldFilter");
  var filterWorld = worldSel ? worldSel.value : "all";
  var lvlSel = document.getElementById("npcLvlFilter");
  var filterLvl = lvlSel ? lvlSel.value : "all";

  var filtered = NPC_DB;
  if (filterType !== "all") {
    if (filterType === "hero_tier") filtered = NPC_DB.filter(function(n){return n.tier==="hero";});
    else filtered = NPC_DB.filter(function(n){return n.type===filterType || n.tier===filterType;});
  }
  if (filterWorld !== "all") filtered = filtered.filter(function(n){return n.world===filterWorld;});
  if (filterLvl !== "all") filtered = filtered.filter(function(n){return calcNPCLevel(n)<=parseInt(filterLvl);});

  // 按战力从高到低排序
  filtered.sort(function(a,b){ return calcNPCPower(b) - calcNPCPower(a); });

  var html = "";

  // 等级筛选提示
  var pLvl = player.level;
  html += '<div class="npc-level-tip">你的等级：<b>Lv.' + pLvl + '</b> · 可挑战等级约 <b>Lv.' + Math.max(1, pLvl-2) + ' ~ Lv.' + (pLvl+2) + '</b> 的角色</div>';

  html += '<div class="npc-grid">';
  filtered.forEach(function(npc) {
    var np = calcNPCPower(npc);
    var nLvl = calcNPCLevel(npc);
    var lvlDiff = nLvl - pLvl;
    var lvlColor = lvlDiff <= -3 ? '#50c878' : (lvlDiff <= 0 ? '#4cc9f0' : (lvlDiff <= 2 ? '#ffd60a' : '#e0526a'));
    var lvlTag = lvlDiff <= -3 ? '碾压' : (lvlDiff <= 0 ? '轻松' : (lvlDiff <= 2 ? '势均力敌' : '困难'));

    html += '<div class="npc-card-mini '+npc.type+'">';
    html += '<div class="nc-header">';
    html += '<span class="nc-icon">'+npc.icon+'</span>';
    html += '<span class="nc-name">'+npc.name+'</span>';
    html += '<span class="nc-type">'+typeLabel(npc.type)+'</span>';
    html += '</div>';
    html += '<div class="nc-level-row">';
    html += '<span class="nc-level" style="color:'+lvlColor+'">Lv.'+nLvl+'</span>';
    html += '<span class="nc-level-tag" style="background:'+lvlColor+'22;color:'+lvlColor+'">'+lvlTag+'</span>';
    html += '<span class="nc-tier">'+tierLabel(npc.tier)+'</span>';
    html += '</div>';
    // 六维属性（含装备加成）
    var npcEb = npc.equipBonus || {atk:0,def:0,matk:0,mdef:0};
    html += '<div class="nc-stats">';
    html += '<span>⚔'+(npc.atk+npcEb.atk)+'</span><span>🛡'+(npc.def+npcEb.def)+'</span><span>🔮'+(npc.matk+npcEb.matk)+'</span><span>✨'+(npc.mdef+npcEb.mdef)+'</span>';
    html += '<span>❤'+npc.hp+'</span><span>💙'+npc.mp+'</span>';
    html += '</div>';
    html += '<div class="nc-world">🌍 '+npc.world+' · 战力 '+Math.round(np)+'</div>';
    html += '<div class="nc-desc">📜 '+npc.desc+'</div>';
    if (npc.defaultEquip.length > 0) {
      var eqNames = npc.defaultEquip.map(function(eid){
        var eq = EQUIP_DB.find(function(e){return e.id==eid;});
        return eq ? eq.icon+eq.name : "";
      }).filter(Boolean).join(" ");
      html += '<div class="nc-equip">🎒 '+eqNames+'</div>';
    }
    html += '</div>';
  });
  html += '</div>';

  // 图例
  html += '<div class="legend-section">';
  html += '<h4 class="legend-title">📌 图例说明</h4>';
  html += '<div class="legend-grid">';
  html += '<div class="legend-item"><span class="legend-icon">🏅</span>英雄级（Boss）</div>';
  html += '<div class="legend-item"><span class="legend-icon">⭐</span>精英级</div>';
  html += '<div class="legend-item"><span class="legend-icon">👤</span>普通级</div>';
  html += '<div class="legend-item"><span style="color:#50c878;font-weight:700;">碾压</span> 轻松获胜</div>';
  html += '<div class="legend-item"><span style="color:#4cc9f0;font-weight:700;">轻松</span> 有优势</div>';
  html += '<div class="legend-item"><span style="color:#ffd60a;font-weight:700;">势均力敌</span> 看操作</div>';
  html += '<div class="legend-item"><span style="color:#e0526a;font-weight:700;">困难</span> 难以战胜</div>';
  html += '<div class="legend-item"><span class="legend-icon">⚔</span>攻击力</div>';
  html += '<div class="legend-item"><span class="legend-icon">🛡</span>防御力</div>';
  html += '<div class="legend-item"><span class="legend-icon">🔮</span>魔法攻击</div>';
  html += '<div class="legend-item"><span class="legend-icon">✨</span>魔法防御</div>';
  html += '<div class="legend-item"><span class="legend-icon">❤</span>生命值</div>';
  html += '</div>';
  html += '</div>';

  document.getElementById("npcList").innerHTML = html;
}

// ===== 成长日志 =====
function renderGrowthLog() {
  var log = getGrowthLog();
  if (log.length === 0) {
    document.getElementById("growthLog").innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted);">还没有成长记录，快去打卡吧！</div>';
    return;
  }
  var html = "";
  log.forEach(function(e) {
    html += '<div class="growth-entry">';
    html += '<span class="ge-date">'+e.date+'</span>';
    html += '<span class="ge-icon">'+e.icon+'</span>';
    html += '<span class="ge-desc">'+e.desc+'</span>';
    html += '<span class="ge-gains">'+e.gains+'</span>';
    html += '</div>';
  });
  document.getElementById("growthLog").innerHTML = html;
}

// ===== 全局渲染 =====
function renderAll() {
  renderHome();
  renderStudyPanel();
  renderEquipPanel();
  renderNPCPanel();
  renderGrowthLog();
}

// ===== 星空 =====
function initStars() {
  var c = document.getElementById("stars");
  for (var i = 0; i < 80; i++) {
    var s = document.createElement("div"); s.className = "star";
    s.style.left = Math.random()*100+"%"; s.style.top = Math.random()*100+"%";
    s.style.animationDelay = Math.random()*3+"s";
    s.style.width = s.style.height = (1 + Math.random() * 2.5) + "px";
    c.appendChild(s);
  }
}

// ===== 启动 =====
initStars();
initNPCFilters();

// ===== 同步存档到文件 =====
function syncToFile(cb) {
  saveAllToServer(function(ok){
    if (ok) showToast("存档已保存到文件");
    else showToast("保存失败：服务器未连接");
    cb && cb(ok);
  });
}

// ===== 从文件重新加载存档 =====
function reloadFromFile() {
  loadSaveFromServer(function(ok){
    if (ok) {
      renderAll();
      showToast("已从文件重新加载存档");
    } else {
      showToast("加载失败：服务器未连接");
    }
  });
}

// ===== JSON 存档导出（浏览器下载）=====
function exportSave() {
  var saveData = {
    version: 3,
    exportDate: new Date().toISOString(),
    currentChar: _currentChar,
    characters: _charList,
    player: _cache.player,
    checkinDate: _cache.checkinDate,
    growthLog: _cache.growthLog,
    dailyOpp: _cache.dailyOpp,
    passiveBattle: _cache.passiveBattle,
    lastStudyDate: _cache.lastStudyDate,
    studyLogs: _cache.studyLogs,
    activeChallengeDate: _cache.activeChallengeDate,
    activeChallengeCount: _cache.activeChallengeCount
  };
  var json = JSON.stringify(saveData, null, 2);
  var blob = new Blob([json], {type: "application/json"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  var dateStr = new Date().toISOString().split("T")[0];
  a.download = "勇者征程-存档-" + dateStr + ".json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast("存档已导出到下载文件夹！");
}

// ===== JSON 存档导入（从浏览器上传，创建新角色）=====
// 应用导入的存档数据到当前缓存
function applyImportData(data, charName) {
  // 构造标准格式的数据对象，使用 applySaveData 统一处理
  var saveData = {
    player: data.player,
    checkinDate: data.checkinDate || "",
    growthLog: data.growthLog || [],
    dailyOpp: data.dailyOpp || null,
    passiveBattle: data.passiveBattle || null,
    lastStudyDate: data.lastStudyDate || "",
    studyLogs: data.studyLogs || [],
    activeChallengeDate: data.activeChallengeDate || "",
    activeChallengeCount: data.activeChallengeCount || 0,
    currentChar: charName,
    characters: _charList
  };
  saveData.player.name = charName;
  applySaveData(saveData);
}

function importSave() {
  var input = document.createElement("input");
  input.type = "file";
  input.accept = ".json,application/json";
  input.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        if (!data.player || !data.player.level) {
          showToast("存档文件格式不正确！");
          return;
        }
        
        var charName = data.player.name || "导入角色";
        
        if (!confirm("确定要导入存档「" + charName + "」吗？\n将创建为新角色，不会覆盖现有进度。")) return;
        
        // 先尝试通过服务器创建新角色
        fetch(API_BASE + "/create", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({name: charName})
        })
          .then(function(r){ return r.json(); })
          .then(function(d){
            if (d.success && d.save) {
              // 角色创建成功，导入数据
              applyImportData(data, charName);
              
              // 保存到服务器
              saveAllToServer(function(ok){
                if (ok) {
                  _cache.serverOnline = true;
                  // 重新加载角色列表
                  fetch(API_BASE + "/save", {method:"GET"})
                    .then(function(r){ return r.json(); })
                    .then(function(sd){
                      if (sd && sd.characters) {
                        _charList = sd.characters;
                      }
                      updateCharBar();
                      updateSaveStatus();
                      renderAll();
                      showToast("存档导入成功！已创建角色：" + charName);
                    })
                    .catch(function(){
                      updateCharBar();
                      updateSaveStatus();
                      renderAll();
                      showToast("存档导入成功！已创建角色：" + charName);
                    });
                } else {
                  showToast("警告：服务器未连接，仅内存中生效");
                  renderAll();
                }
              });
            } else {
              // 角色名已存在，尝试加后缀
              var newName = charName + "_导入";
              if (confirm("角色名「" + charName + "」已存在，是否创建为「" + newName + "」？")) {
                applyImportData(data, newName);
                
                // 更新角色列表
                var exists = _charList.some(function(c){return c.name===newName;});
                if (!exists) {
                  _charList.push({name:newName, level:data.player.level, createdAt:data.player.createdAt || new Date().toISOString().split("T")[0]});
                }
                
                saveAllToServer(function(ok){
                  if (!ok) showToast("警告：服务器未连接，仅内存中生效");
                  updateCharBar();
                  updateSaveStatus();
                  renderAll();
                  showToast("存档导入成功！角色：" + newName);
                });
              }
            }
          })
          .catch(function(){
            // 服务器不可用，直接在内存中导入
            applyImportData(data, charName);
            
            var exists = _charList.some(function(c){return c.name===charName;});
            if (!exists) {
              _charList.push({name:charName, level:data.player.level, createdAt:data.player.createdAt || new Date().toISOString().split("T")[0]});
            }
            updateCharBar();
            updateSaveStatus();
            renderAll();
            showToast("存档导入成功（离线模式）");
          });
      } catch(err) {
        showToast("导入失败：文件格式错误");
        console.error(err);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ===== 重置存档 =====
function resetSave() {
  if (!confirm("确定要重置所有进度吗？此操作不可撤销！\n建议先导出存档备份。")) return;
  _cache.player = JSON.parse(JSON.stringify(PLAYER_INIT));
  _cache.player.createdAt = new Date().toISOString().split("T")[0];
  _cache.checkinDate = "";
  _cache.growthLog = [];
  _cache.dailyOpp = { date: todayStr(), npc: pickDailyOpponent(), completed: false, result: null, usedItem: null, drops: [] };
  _cache.passiveBattle = { date: todayStr(), options: pickPassiveChallengers(), npc: null, completed: false, result: null, usedItem: null, drops: [], battle: null };
  
  // 重置服务器文件
  if (_cache.serverOnline) {
    fetch(API_BASE + "/reset", {method:"POST"})
      .then(function(r){ return r.json(); })
      .then(function(d){
        if (d.success && d.save) {
          _cache.player = d.save.player;
          _cache.checkinDate = d.save.checkinDate;
          _cache.growthLog = d.save.growthLog;
          _cache.dailyOpp = d.save.dailyOpp;
          _cache.passiveBattle = d.save.passiveBattle || null;
        }
      })
      .catch(function(){});
  }
  
  renderAll();
  showToast("已重置，开始新的冒险！");
}

// ===== 更新存档状态显示 =====
function updateSaveStatus() {
  var el = document.getElementById("saveStatus");
  if (!el) return;
  if (_cache.serverOnline) {
    el.innerHTML = '<span style="color:var(--win)">●</span> 已连接 · 数据保存在 save/勇者征程-' + _currentChar + '.json';
  } else {
    el.innerHTML = '<span style="color:var(--lose)">●</span> 未连接服务器 · 数据仅在内存中';
  }
}

// ===== 初始创建角色标记（用于首次启动时禁止关闭弹窗）=====
var _needCreateChar = false;

// 加载玩家数据并渲染
(function() {
  // 从服务器加载存档
  loadSaveFromServer(function(serverOk, reason) {
    if (reason === 'no_char') {
      // 没有角色，弹出创建角色弹窗（不可关闭）
      _needCreateChar = true;
      showCreateChar();
      return;
    }

    var p = getPlayer();

    // 如果没有任何装备，尝试从 localStorage 迁移（旧抽奖程序）
    var hasItems = false;
    for (var k in p.inventory) { hasItems = true; break; }
    if (!hasItems) {
      try {
        var stored = localStorage.getItem("yx_equipment");
        if (stored) {
          var eqs = JSON.parse(stored);
          eqs.forEach(function(e) {
            var id = parseInt(e.id);
            p.inventory[id] = (p.inventory[id] || 0) + 1;
          });
          savePlayer(p);
        }
      } catch(e) {}
    }

    var today = todayStr();

    // 自动选一个每日对手（如果还没选，或者日期变了）
    var dailyOpp = getDailyOpponent();
    if (!dailyOpp || !dailyOpp.date || dailyOpp.date !== today) {
      saveDailyOpponent({ date: today, npc: pickDailyOpponent(), completed: false, result: null, usedItem: null, drops: [] });
    }
    // 自动生成被动应战对手（如果没有，或者日期变了）
    var passive = getPassiveBattle();
    if (!passive || !passive.date || passive.date !== today) {
      savePassiveBattle({ date: today, options: pickPassiveChallengers(), npc: null, completed: false, result: null, usedItem: null, drops: [], battle: null });
    }

    renderAll();
    switchPanel("home");
    updateSaveStatus();
    updateCharBar();
  });
})();
</script>
