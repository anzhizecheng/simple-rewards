<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>勇者征程 · 每日挑战</title>
<style>
:root {
  --bg:#0C0D1A; --bg2:#15172E; --bg3:#1E2045; --ink:#E8E8F0; --muted:#7A7CA0; --rule:#2A2C52;
  --artifact:#FFD700; --legendary:#FF6B35; --epic:#B048E0; --rare:#0070DD; --common:#5A9216; --gold:#FFD700;
  --atk:#E0556A; --def:#5B8DEF; --matk:#E090E0; --mdef:#5BC0C0; --win:#4CAF7A; --draw:#E8A840; --lose:#E0556A;
  --hp:#E0556A; --mp:#5B8DEF;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden;font-size:18px;}

.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;opacity:0.5;animation:twinkle 3s infinite;}
@keyframes twinkle{0%,100%{opacity:0.15}50%{opacity:0.7}}

.container{position:relative;z-index:1;max-width:min(1400px,90%);margin:0 auto;padding:20px 20px 60px;}

/* 导航 */
.nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;justify-content:center;}
.nav-btn{padding:8px 18px;border-radius:20px;border:1.5px solid var(--rule);background:var(--bg2);color:var(--muted);font-size:18px;font-weight:600;cursor:pointer;transition:all 0.2s;letter-spacing:1px;}
.nav-btn:hover,.nav-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(255,215,0,0.08);}

/* 标题 */
.header{text-align:center;padding:20px 0 12px;}
.header h1{font-size:28px;font-weight:900;color:var(--gold);letter-spacing:3px;text-shadow:0 0 20px rgba(255,215,0,0.2);}
.header .subtitle{font-size:18px;color:var(--muted);margin-top:4px;}

/* 面板 */
.panel{display:none;margin-top:16px;}
.panel.active{display:block;animation:fadeIn 0.3s ease;}
@keyframes fadeIn{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}

/* 玩家状态 */
.player-card{background:var(--bg2);border:2px solid var(--gold);border-radius:14px;padding:16px 20px;margin-bottom:16px;position:relative;overflow:hidden;}
.player-card::after{content:'';position:absolute;top:0;right:0;width:100px;height:100%;background:linear-gradient(90deg,transparent,rgba(255,215,0,0.03));pointer-events:none;}
.player-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.player-avatar{font-size:40px;filter:drop-shadow(0 0 8px rgba(255,215,0,0.3));}
.player-info{flex:1;}
.player-name{font-size:18px;font-weight:800;color:var(--gold);}
.player-level{font-size:18px;color:var(--muted);}
.player-badge{font-size:18px;padding:2px 8px;border-radius:10px;background:rgba(255,215,0,0.15);color:var(--gold);font-weight:700;margin-left:8px;}

.player-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.player-stat{background:var(--bg);border-radius:8px;padding:8px 10px;text-align:center;}
.player-stat .stat-label{font-size:18px;color:var(--muted);margin-bottom:2px;}
.player-stat .stat-value{font-size:18px;font-weight:900;}
.player-stat .stat-bonus{font-size:18px;color:var(--muted);}
.player-stat.atk .stat-value{color:var(--atk);}
.player-stat.def .stat-value{color:var(--def);}
.player-stat.matk .stat-value{color:var(--matk);}
.player-stat.mdef .stat-value{color:var(--mdef);}
.player-stat.hp .stat-value{color:var(--hp);}
.player-stat.mp .stat-value{color:var(--mp);}

.player-xp{margin:12px 0 0;display:flex;align-items:center;gap:10px;}
.player-xp .xp-label{font-size:18px;color:var(--muted);white-space:nowrap;}
.player-xp .xp-bar{flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden;}
.player-xp .xp-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gold),var(--atk));transition:width 0.5s;}
.player-xp .xp-text{font-size:18px;color:var(--muted);white-space:nowrap;}

/* 装备栏 */
.equip-overview{margin-top:12px;padding-top:12px;border-top:1px solid var(--rule);}
.eo-title{font-size:18px;color:var(--muted);margin-bottom:8px;text-align:center;}
.eo-stats{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
.eo-stat{font-size:18px;padding:4px 8px;border-radius:6px;background:rgba(255,215,0,0.1);color:var(--gold);font-weight:600;}
.eo-stat.hp{background:rgba(255,80,80,0.12);color:#ff5050;}
.eo-stat.mp{background:rgba(80,140,255,0.12);color:#508cff;}
.eo-stat.atk{background:rgba(255,120,80,0.12);color:#ff7850;}
.eo-stat.def{background:rgba(80,180,120,0.12);color:#50b478;}
.eo-stat.matk{background:rgba(180,100,220,0.12);color:#b464dc;}
.eo-stat.mdef{background:rgba(80,180,200,0.12);color:#50b4c8;}
.eo-empty{font-size:18px;color:var(--muted);}
.equip-slot{background:var(--bg);border:1.5px dashed var(--rule);border-radius:8px;padding:10px;text-align:center;min-height:70px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;}
.equip-slot:hover{border-color:var(--gold);}
.equip-slot.equipped{border-style:solid;border-color:var(--gold);}
.equip-slot .slot-label{font-size:18px;color:var(--muted);margin-bottom:4px;}
.equip-slot .slot-icon{font-size:24px;}
.equip-slot .slot-name{font-size:18px;font-weight:700;margin-top:2px;}
.equip-slot .slot-empty{font-size:18px;color:var(--muted);}

/* 每日打卡区 */
.checkin-area{text-align:center;padding:16px 0;}
.checkin-orb{width:140px;height:140px;margin:0 auto;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 35% 35%,#444466,var(--bg3) 60%,var(--bg2));border:3px solid var(--gold);box-shadow:0 0 30px rgba(255,215,0,0.2);transition:all 0.3s;position:relative;}
.checkin-orb:hover{transform:scale(1.05);box-shadow:0 0 50px rgba(255,215,0,0.4);}
.checkin-orb .orb-icon{font-size:48px;pointer-events:none;}
.checkin-orb .orb-text{position:absolute;bottom:-32px;left:50%;transform:translateX(-50%);font-size:18px;font-weight:700;color:var(--gold);white-space:nowrap;pointer-events:none;}
.checkin-orb.disabled{opacity:0.5;cursor:not-allowed;}
.checkin-orb.disabled:hover{transform:none;box-shadow:0 0 30px rgba(255,215,0,0.2);}
.checkin-result{margin-top:40px;padding:16px;background:var(--bg2);border-radius:12px;border:1px solid var(--gold);display:none;text-align:center;animation:fadeIn 0.5s ease;}
.checkin-result.show{display:block;}
.checkin-result .cr-icon{font-size:48px;margin-bottom:8px;}
.checkin-result .cr-name{font-size:20px;font-weight:900;color:var(--gold);margin-bottom:4px;}
.checkin-result .cr-desc{font-size:18px;color:var(--muted);margin-bottom:8px;}
.checkin-result .cr-gains{font-size:18px;color:var(--ink);line-height:1.8;}

/* 竞技场 */
.arena-result{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px;}
.arena-col{background:var(--bg2);border-radius:10px;padding:12px;border:1px solid var(--rule);}
.arena-col h3{font-size:18px;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.arena-col.win h3{color:var(--win);}
.arena-col.draw h3{color:var(--draw);}
.arena-col.lose h3{color:var(--lose);}
.arena-col .opp-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--rule);font-size:18px;}
.arena-col .opp-row:last-child{border-bottom:none;}
.opp-icon{font-size:18px;}
.opp-name{flex:1;font-weight:600;}
.opp-power{font-size:18px;color:var(--muted);}
.opp-gap{font-size:18px;margin-left:4px;}

/* 挑战区 */
.challenge-card{background:var(--bg2);border:1.5px solid var(--rule);border-radius:14px;padding:20px;margin-bottom:16px;}
.challenge-card h2{font-size:18px;color:var(--gold);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.challenge-card .vs-display{display:flex;align-items:center;justify-content:center;gap:16px;margin:16px 0;}
.challenge-card .vs-player,.challenge-card .vs-opp{text-align:center;}
.challenge-card .vs-icon{font-size:40px;}
.challenge-card .vs-name{font-size:18px;font-weight:700;margin-top:4px;}
.challenge-card .vs-power{font-size:18px;color:var(--muted);}
.challenge-card .vs-vs{font-size:26px;color:var(--gold);font-weight:900;}
.challenge-card .vs-result{text-align:center;font-size:22px;font-weight:900;padding:10px;border-radius:8px;margin:12px 0;}
.challenge-card .vs-result.win{color:var(--win);background:rgba(76,175,122,0.1);}
.challenge-card .vs-result.draw{color:var(--draw);background:rgba(232,168,64,0.1);}
.challenge-card .vs-result.lose{color:var(--lose);background:rgba(224,85,106,0.1);}
.challenge-story{font-size:18px;line-height:1.8;color:var(--ink);padding:12px;background:var(--bg);border-radius:8px;margin-top:12px;}

/* 战利品掉落 */
.drop-section{margin-top:16px;padding:12px;background:rgba(255,215,0,0.08);border-radius:8px;border:1px solid rgba(255,215,0,0.2);}
.drop-title{font-size:18px;font-weight:700;color:var(--gold);margin-bottom:10px;text-align:center;}
.drop-items{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.drop-item{display:flex;flex-direction:column;align-items:center;padding:8px 12px;border-radius:8px;background:var(--bg);border:1.5px solid var(--rule);min-width:80px;animation:dropIn 0.5s ease;}
.drop-item.common{border-color:rgba(100,100,100,0.4);}
.drop-item.rare{border-color:rgba(0,112,221,0.4);}
.drop-item.epic{border-color:rgba(176,72,224,0.4);}
.drop-item.legendary{border-color:rgba(255,107,53,0.4);}
.drop-item.artifact{border-color:rgba(255,215,0,0.6);box-shadow:0 0 10px rgba(255,215,0,0.2);}
.drop-icon{font-size:26px;margin-bottom:4px;}
.drop-name{font-size:18px;color:var(--ink);text-align:center;line-height:1.2;}
@keyframes dropIn{from{opacity:0;transform:translateY(-10px) scale(0.8);}to{opacity:1;transform:translateY(0) scale(1);}}

/* 回合制战斗 */
.battle-vs{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;}
.battle-side{flex:1;text-align:center;}
.battle-avatar{font-size:42px;margin-bottom:6px;}
.battle-name{font-size:18px;font-weight:700;margin-bottom:6px;}
.battle-hp-bar{height:12px;background:rgba(0,0,0,0.2);border-radius:6px;overflow:hidden;margin-bottom:4px;}
.battle-hp-fill{height:100%;border-radius:6px;transition:width 0.5s ease;}
.battle-hp-fill.player{background:linear-gradient(90deg,#50c878,#3ba85e);}
.battle-hp-fill.npc{background:linear-gradient(90deg,#e0526a,#c83850);}
.battle-hp-text{font-size:18px;color:var(--muted);}
.battle-vs-text{font-size:18px;font-weight:800;color:var(--gold);padding:0 8px;}
.battle-log{max-height:350px;overflow-y:auto;padding:8px;background:var(--bg2);border-radius:8px;margin-bottom:12px;}
.battle-round{padding:8px 10px;margin-bottom:6px;background:var(--bg);border-radius:6px;border-left:3px solid var(--rule);}
.battle-round-title{font-size:18px;font-weight:700;color:var(--muted);margin-bottom:6px;}
.battle-action{font-size:18px;margin-bottom:4px;line-height:1.6;}
.battle-action.player-attack{color:#3ba85e;}
.battle-action.npc-attack{color:#c83850;}
.ba-who{font-weight:700;}
.ba-crit{color:#ff6b35;font-weight:700;}
.ba-dmg{font-weight:700;font-size:18px;}
.battle-special{font-size:18px;color:var(--gold);background:rgba(255,215,0,0.1);padding:4px 8px;border-radius:4px;margin:4px 0;text-align:center;}
.battle-hp-row{display:flex;align-items:center;gap:8px;margin-top:6px;font-size:18px;}
.battle-hp-mini{flex:1;height:6px;background:rgba(0,0,0,0.2);border-radius:3px;overflow:hidden;}
.battle-hp-mini.right{direction:rtl;}
.battle-hp-mini-text{font-size:18px;color:var(--muted);min-width:30px;text-align:center;}
.battle-vs-small{font-size:18px;color:var(--muted);font-weight:700;}
.battle-result{text-align:center;font-size:18px;font-weight:800;padding:12px;border-radius:8px;margin-bottom:8px;}
.battle-result.win{color:#50c878;background:rgba(80,200,120,0.1);}
.battle-result.lose{color:#e0526a;background:rgba(224,82,106,0.1);}
.battle-result.draw{color:var(--muted);background:rgba(128,128,128,0.1);}
.battle-used-item{text-align:center;font-size:18px;color:var(--gold);margin-bottom:8px;}
.battle-summary{background:var(--bg2);border-radius:8px;padding:10px 12px;margin-bottom:8px;}
.challenge-btn{padding:10px 28px;border-radius:8px;border:none;font-size:18px;font-weight:700;cursor:pointer;background:var(--gold);color:var(--bg);transition:all 0.2s;margin:8px 4px;}
.challenge-btn:hover{transform:scale(1.05);}
.challenge-btn.secondary{background:var(--bg2);color:var(--gold);border:1.5px solid var(--gold);}
.passive-card{border-left:4px solid #ff6b35;}
.passive-intro{text-align:center;font-size:18px;color:var(--muted);margin-bottom:12px;}
.passive-npc{display:flex;gap:12px;align-items:center;padding:12px;background:var(--bg2);border-radius:10px;}
.pn-avatar{font-size:48px;min-width:60px;text-align:center;}
.pn-info{flex:1;}
.pn-name{font-size:18px;font-weight:700;margin-bottom:2px;}
.pn-type{font-size:18px;color:var(--muted);margin-bottom:4px;}
.pn-desc{font-size:18px;color:var(--ink);line-height:1.4;}
.npc-level-tip{text-align:center;padding:12px 16px;background:var(--bg2);border-radius:8px;margin-bottom:12px;font-size:18px;color:var(--ink);}
.nc-level-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.nc-level{font-size:18px;font-weight:800;}
.nc-level-tag{font-size:18px;padding:2px 6px;border-radius:4px;font-weight:700;}
.nc-tier{font-size:18px;color:var(--muted);margin-left:auto;}
.nc-world{font-size:18px;color:var(--muted);margin-top:4px;}
.nc-desc{font-size:18px;color:var(--ink);margin-top:4px;line-height:1.4;padding:6px 8px;background:var(--bg2);border-radius:6px;}

/* 选择对手 */
.opp-select{margin:12px 0;}
.opp-select select{width:100%;padding:10px;border-radius:8px;border:1.5px solid var(--rule);background:var(--bg);color:var(--ink);font-size:18px;}

/* 装备库面板 */
.equip-list{display:flex;flex-direction:column;gap:16px;}
.equip-card{background:var(--bg2);border:1.5px solid var(--rule);border-radius:10px;padding:12px;transition:all 0.2s;position:relative;}
.equip-card:hover{transform:translateY(-2px);}
.equip-card.artifact{border-color:rgba(255,215,0,0.4);}
.equip-card.legendary{border-color:rgba(255,107,53,0.4);}
.equip-card.epic{border-color:rgba(176,72,224,0.4);}
.equip-card.rare{border-color:rgba(0,112,221,0.4);}
.equip-card.common{border-color:rgba(90,146,22,0.4);}
.equip-card.equipped{border-color:var(--gold);box-shadow:0 0 12px rgba(255,215,0,0.15);}
.equip-card.level-locked{opacity:0.6;filter:grayscale(30%);}
.equip-card.not-owned{opacity:0.5;filter:grayscale(70%);}
.equip-section{margin-bottom:20px;}
.inventory-section{background:linear-gradient(135deg,rgba(255,215,0,0.05),transparent);padding:12px;border-radius:12px;border:1px solid rgba(255,215,0,0.15);}
.inventory-section .section-title{color:var(--gold);border-bottom-color:rgba(255,215,0,0.3);}
.equip-slots-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.slot-chip{padding:6px 14px;border-radius:20px;background:var(--bg2);border:1px solid var(--rule);font-size:18px;font-weight:600;color:var(--muted);}
.ec-btn.unequip{background:rgba(80,200,120,0.15);border-color:rgba(80,200,120,0.5);color:#50c878;font-size:18px;}
.ec-btn.unequip:hover{background:rgba(80,200,120,0.25);}
.ec-btn.equip-btn{background:rgba(100,150,255,0.15);border-color:rgba(100,150,255,0.5);color:#6496ff;}
.ec-btn.equip-btn:hover{background:rgba(100,150,255,0.25);}
.encyclopedia-section{padding-top:8px;border-top:2px dashed var(--rule);}
.tome-section{background:linear-gradient(135deg,rgba(150,100,255,0.06),transparent);padding:12px;border-radius:12px;border:1px solid rgba(150,100,255,0.2);margin-bottom:16px;}
.tome-section .section-title{color:#b48cff;border-bottom-color:rgba(150,100,255,0.3);}
.tome-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.tome-card{background:var(--bg2);border:1px solid rgba(150,100,255,0.3);border-radius:10px;padding:10px;transition:all 0.2s;}
.tome-card:hover{border-color:rgba(150,100,255,0.6);transform:translateY(-2px);box-shadow:0 4px 12px rgba(150,100,255,0.15);}
.tome-card .tome-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.tome-card .tome-icon{font-size:24px;}
.tome-card .tome-name{font-size:18px;font-weight:700;color:var(--ink);}
.tome-card .tome-world{font-size:18px;color:var(--muted);}
.tome-card .tome-effect{font-size:18px;color:#b48cff;margin-top:4px;padding-top:4px;border-top:1px dashed rgba(150,100,255,0.2);}
.section-title{font-size:18px;font-weight:800;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--rule);color:var(--ink);}
.equip-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.npc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.npc-card-mini{word-break:break-word;overflow-wrap:break-word;}

.legend-section{margin-top:20px;padding:14px;background:var(--bg2);border-radius:10px;border:1px solid var(--rule);}
.legend-title{font-size:18px;font-weight:700;margin-bottom:10px;color:var(--ink);}
.legend-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px 16px;font-size:18px;}
.legend-item{display:flex;align-items:center;gap:6px;color:var(--muted);}
.legend-dot{width:12px;height:12px;border-radius:50%;display:inline-block;}
.legend-dot.legendary{background:linear-gradient(135deg,#ffd700,#ff8c00);box-shadow:0 0 4px rgba(255,215,0,0.5);}
.legend-dot.epic{background:linear-gradient(135deg,#c77dff,#9d4edd);}
.legend-dot.rare{background:linear-gradient(135deg,#4cc9f0,#4361ee);}
.legend-dot.uncommon{background:linear-gradient(135deg,#52b788,#40916c);}
.legend-dot.common{background:linear-gradient(135deg,#adb5bd,#6c757d);}
.legend-icon{width:18px;text-align:center;font-size:18px;}
.ec-btn.locked{background:rgba(128,128,128,0.2);color:var(--muted);cursor:not-allowed;}
.ec-stat.hp{color:#e0526a;}
.ec-stat.mp{color:#4cc9f0;}
.equip-card .ec-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.equip-card .ec-icon{font-size:24px;}
.equip-card .ec-info{flex:1;min-width:0;}
.equip-card .ec-name{font-size:18px;font-weight:700;}
.equip-card.artifact .ec-name{color:var(--artifact);}
.equip-card.legendary .ec-name{color:var(--legendary);}
.equip-card.epic .ec-name{color:var(--epic);}
.equip-card.rare .ec-name{color:var(--rare);}
.equip-card.common .ec-name{color:var(--common);}
.equip-card .ec-type{font-size:18px;color:var(--muted);}
.equip-card .ec-stats{display:flex;gap:6px;flex-wrap:wrap;font-size:18px;margin-bottom:6px;}
.equip-card .ec-stat{padding:2px 6px;border-radius:4px;background:var(--bg);font-weight:600;}
.equip-card .ec-stat.atk{color:var(--atk);}
.equip-card .ec-stat.def{color:var(--def);}
.equip-card .ec-stat.matk{color:var(--matk);}
.equip-card .ec-stat.mdef{color:var(--mdef);}
.equip-card .ec-req{font-size:18px;color:var(--muted);margin-bottom:6px;}
.equip-card .ec-effect{font-size:18px;color:var(--gold);margin-bottom:6px;line-height:1.4;}
.equip-card .ec-actions{display:flex;gap:6px;}
.equip-card .ec-btn{padding:4px 12px;border-radius:6px;border:1px solid var(--rule);background:var(--bg);color:var(--ink);font-size:18px;cursor:pointer;transition:all 0.2s;flex:1;text-align:center;}

.equip-card .ec-btn.active{background:var(--gold);color:var(--bg);border-color:var(--gold);cursor:default;}
.equip-card .ec-btn.exchange{background:rgba(100,150,255,0.1);border-color:rgba(100,150,255,0.4);color:#6496ff;}
.equip-card .ec-btn.exchange:hover{background:rgba(100,150,255,0.2);}
.equip-card .ec-btn.use{background:rgba(80,200,120,0.1);border-color:rgba(80,200,120,0.4);color:#50c878;}
.equip-card .ec-btn.use:hover{background:rgba(80,200,120,0.2);}

/* NPC 图鉴 */
.npc-list{display:block;}
.npc-card-mini{background:var(--bg2);border:1.5px solid var(--rule);border-radius:10px;padding:12px;transition:all 0.2s;}
.npc-card-mini:hover{transform:translateY(-2px);}
.npc-card-mini.hero{border-left:3px solid var(--legendary);}
.npc-card-mini.elite{border-left:3px solid var(--epic);}
.npc-card-mini.common{border-left:3px solid var(--rare);}
.npc-card-mini.monster{border-left:3px solid var(--lose);}
.npc-card-mini .nc-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.npc-card-mini .nc-icon{font-size:24px;}
.npc-card-mini .nc-name{font-size:18px;font-weight:700;}
.npc-card-mini .nc-type{font-size:18px;padding:1px 6px;border-radius:8px;font-weight:600;}
.npc-card-mini.hero .nc-type{color:var(--legendary);background:rgba(255,107,53,0.15);}
.npc-card-mini.elite .nc-type{color:var(--epic);background:rgba(176,72,224,0.15);}
.npc-card-mini.common .nc-type{color:var(--rare);background:rgba(0,112,221,0.15);}
.npc-card-mini.monster .nc-type{color:var(--lose);background:rgba(224,85,106,0.15);}
.npc-card-mini .nc-stats{font-size:18px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;}
.npc-card-mini .nc-prompt{font-size:18px;color:var(--muted);margin-top:6px;line-height:1.4;font-style:italic;}
.npc-card-mini .nc-equip{font-size:18px;color:var(--gold);margin-top:4px;}

/* 成长日志 */
.growth-log{max-height:300px;overflow-y:auto;}
.growth-entry{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--rule);font-size:18px;}
.growth-entry .ge-date{color:var(--muted);width:95px;flex-shrink:0;font-size:18px;}
.growth-entry .ge-icon{font-size:18px;width:24px;text-align:center;}
.growth-entry .ge-desc{flex:1;}
.growth-entry .ge-gains{color:var(--gold);font-weight:700;flex-shrink:0;font-size:18px;}

/* 学习汇报 */
.study-panel{padding:16px;}
.study-input-box{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px;}
.study-log-list{display:flex;flex-direction:column;gap:10px;}
.study-log-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;}
.study-log-item .sli-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.study-log-item .sli-date{font-size:18px;color:var(--muted);}
.study-log-item .sli-reward{font-size:18px;color:var(--gold);font-weight:700;}
.study-log-item .sli-content{font-size:18px;line-height:1.6;color:var(--text);white-space:pre-wrap;word-break:break-word;}

/* 存档管理 */
.save-manage{background:var(--bg2);border:1.5px solid var(--rule);border-radius:12px;padding:16px;margin-bottom:16px;}
.save-manage .sm-title{font-size:18px;font-weight:800;color:var(--gold);margin-bottom:10px;}
.save-manage .sm-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.save-manage .sm-btn{padding:8px 16px;border-radius:8px;border:1.5px solid var(--gold);background:rgba(255,215,0,0.1);color:var(--gold);font-size:18px;font-weight:700;cursor:pointer;transition:all 0.2s;}
.save-manage .sm-btn:hover{background:var(--gold);color:var(--bg);}
.save-manage .sm-btn.danger{border-color:var(--lose);color:var(--lose);background:rgba(224,85,106,0.1);}
.save-manage .sm-btn.danger:hover{background:var(--lose);color:#fff;}
.save-manage .sm-desc{font-size:18px;color:var(--muted);line-height:1.6;}

/* 通知 Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--bg);padding:10px 24px;border-radius:20px;font-weight:700;font-size:18px;z-index:999;animation:toastIn 0.3s ease,toastOut 0.3s ease 2s forwards;pointer-events:none;}
@keyframes toastIn{0%{opacity:0;transform:translateX(-50%) translateY(-20px)}100%{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{0%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-20px)}}

.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.filter-chip{padding:4px 12px;border-radius:14px;border:1.5px solid var(--rule);background:var(--bg);color:var(--muted);font-size:18px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.filter-chip:hover,.filter-chip.active{border-color:var(--gold);color:var(--gold);}

/* 角色栏 */
.char-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;}
.char-select{position:relative;}
.char-current{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;border:1.5px solid var(--gold);background:rgba(255,215,0,0.1);color:var(--gold);font-size:18px;font-weight:700;cursor:pointer;transition:all 0.2s;user-select:none;}
.char-current:hover{background:var(--gold);color:var(--bg);}
.char-arrow{font-size:18px;}
.char-menu{position:absolute;top:100%;left:0;margin-top:6px;background:var(--bg2);border:1.5px solid var(--rule);border-radius:10px;padding:8px 0;min-width:200px;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,0.4);animation:fadeIn 0.2s ease;}
.char-menu-title{font-size:18px;color:var(--muted);padding:4px 16px 8px;font-weight:600;letter-spacing:1px;}
.char-menu-item{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;transition:all 0.15s;font-size:18px;}
.char-menu-item:hover{background:var(--bg3);}
.char-menu-item.active{color:var(--gold);font-weight:700;}
.char-menu-item .cm-icon{font-size:18px;}
.char-menu-item .cm-info{flex:1;min-width:0;}
.char-menu-item .cm-name{font-weight:600;}
.char-menu-item .cm-lvl{font-size:18px;color:var(--muted);}
.char-menu-item .cm-delete{font-size:18px;color:var(--lose);opacity:0;transition:opacity 0.2s;}
.char-menu-item:hover .cm-delete{opacity:1;}
.char-menu-divider{height:1px;background:var(--rule);margin:6px 0;}
.char-menu-create{padding:8px 16px;cursor:pointer;color:var(--gold);font-size:18px;font-weight:600;transition:all 0.15s;}
.char-menu-create:hover{background:var(--bg3);}
.char-info{font-size:18px;color:var(--muted);}

/* 弹窗 */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fadeIn 0.2s ease;}
.modal-box{background:var(--bg2);border:2px solid var(--gold);border-radius:14px;padding:24px;min-width:360px;max-width:90%;animation:fadeIn 0.3s ease;}
.modal-title{font-size:18px;font-weight:800;color:var(--gold);margin-bottom:16px;text-align:center;}
.modal-body{margin-bottom:20px;}
.form-item{margin-bottom:12px;}
.form-item label{display:block;font-size:18px;color:var(--muted);margin-bottom:6px;font-weight:600;}
.form-item input{width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid var(--rule);background:var(--bg);color:var(--ink);font-size:18px;outline:none;transition:border-color 0.2s;}
.form-item input:focus{border-color:var(--gold);}
.form-tip{font-size:18px;color:var(--muted);line-height:1.6;}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;}
.modal-btn{padding:8px 20px;border-radius:8px;border:none;font-size:18px;font-weight:700;cursor:pointer;transition:all 0.2s;}
.modal-btn.confirm{background:var(--gold);color:var(--bg);}
.modal-btn.confirm:hover{transform:scale(1.05);}
.modal-btn.cancel{background:var(--bg3);color:var(--muted);border:1px solid var(--rule);}
.modal-btn.cancel:hover{color:var(--ink);}

@media(max-width:1000px){
  .equip-grid{grid-template-columns:repeat(3,1fr);}
  .npc-grid{grid-template-columns:repeat(3,1fr);}
}
@media(max-width:750px){
  .equip-grid{grid-template-columns:repeat(2,1fr);}
  .npc-grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:600px){
  .player-stats{grid-template-columns:repeat(2,1fr);}
  .arena-result{grid-template-columns:1fr;}
  .challenge-card .vs-display{flex-direction:column;gap:8px;}
  .equip-grid{grid-template-columns:1fr;}
  .npc-grid{grid-template-columns:1fr;}
  .equip-list{grid-template-columns:1fr;}
  .npc-list{display:block;}
}

<div class="container">

    <div id="homeContent"></div>
  </div>

  </div>

  <!-- 装备库 -->

    </div>

  </div>
</div>

// ============================================================
// 本地存档服务器存储层（数据存在 savegame.json 文件中）
// ============================================================
var API_BASE = "/api"; // 同源服务器
var _cache = {
  player: null,
  checkinDate: "",
  growthLog: [],
  dailyOpp: null,
  activeChallengeResult: null,  // 主动挑战结果缓存
  activeChallengeDate: "",       // 主动挑战日期
  activeChallengeCount: 0,       // 今日主动挑战已用次数
  loaded: false,
  serverOnline: false,
  // 图鉴筛选状态
  encFilter: {rarity:"all", world:"all", lvl:"all"},
  // 背包筛选状态
  bpFilter: {rarity:"all", world:"all", lvl:"all"},
  // 主动挑战筛选状态
  challengeFilter: {type:"all", world:"all", tier:"all", lvl:"all"}
};

// 检测服务器是否在线
function checkServer(cb) {
  fetch(API_BASE + "/save", {method:"GET"})
    .then(function(r){ return r.json(); })
    .then(function(data){
      _cache.serverOnline = true;
      cb && cb(true, data);
    })
    .catch(function(){
      _cache.serverOnline = false;
      cb && cb(false, null);
    });
}

// 从服务器加载完整存档
function loadSaveFromServer(cb) {
  checkServer(function(ok, data){
    if (ok && data && data.player) {
      applySaveData(data);
      _cache.loaded = true;
      cb && cb(true);
    } else if (ok && data && data.noChar) {
      // 服务器在线但没有角色，需要创建新角色
      _cache.serverOnline = true;
      _cache.loaded = true;
      _cache.player = null;
      _currentChar = "";
      _charList = data.characters || [];
      cb && cb(false, 'no_char');
    } else {
      // 服务器不可达，使用内存默认值
      _cache.player = JSON.parse(JSON.stringify(PLAYER_INIT));
      _cache.player.createdAt = new Date().toISOString().split("T")[0];
      _cache.loaded = true;
      _currentChar = "勇者";
      _charList = [{name:"勇者", level:1, createdAt:_cache.player.createdAt}];
      cb && cb(false);
    }
  });
}

// 保存完整存档到服务器
function saveAllToServer(cb) {
  var saveData = {
    version: 2,
    currentChar: _currentChar,
    player: _cache.player,
    checkinDate: _cache.checkinDate,
    growthLog: _cache.growthLog,
    dailyOpp: _cache.dailyOpp,
    passiveBattle: _cache.passiveBattle,
    lastStudyDate: _cache.lastStudyDate,
    studyLogs: _cache.studyLogs,
    activeChallengeDate: _cache.activeChallengeDate,
    activeChallengeCount: _cache.activeChallengeCount
  };
  fetch(API_BASE + "/save", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(saveData)
  })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.success) {
        _cache.serverOnline = true;
        updateSaveStatus();
      }
      cb && cb(d.success);
    })
    .catch(function(){
      _cache.serverOnline = false;
      updateSaveStatus();
      cb && cb(false);
    });
}

// 快速保存（异步，不等待结果）
// 防抖保存（避免短时间内多次保存导致竞态条件）
var _saveTimer = null;
function quickSave() {
  if (_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(function(){
    _saveTimer = null;
    saveAllToServer();
  }, 300);
}

// 立即保存（不防抖，用于需要立即同步的场景）
function quickSaveImmediate() {
  if (_saveTimer) {
    clearTimeout(_saveTimer);
    _saveTimer = null;
  }
  saveAllToServer();
}

// ===== 角色系统 =====
var _charList = []; // 角色列表 [{name,level,createdAt}]
var _currentChar = "";

function getCharList() { return _charList; }
function getCurrentChar() { return _currentChar; }

// 切换角色
function switchChar(name) {
  if (name === _currentChar) return;
  fetch(API_BASE + "/switch", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({name: name})
  })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.success && d.save) {
        applySaveData(d.save);
        renderAll();
        updateCharBar();
        hideCharMenu();
        showToast("已切换到角色：" + name);
      } else {
        showToast("切换失败：" + (d.error || "未知错误"));
      }
    })
    .catch(function(){ showToast("切换失败：服务器未连接"); });
}

// 创建新角色
function doCreateChar() {
  var name = document.getElementById("newCharName").value.trim();
  if (!name) { showToast("请输入角色名称！"); return; }
  if (name.length > 12) { showToast("角色名最多12个字符！"); return; }

  fetch(API_BASE + "/create", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({name: name})
  })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.success && d.save) {
        var isFirstChar = _needCreateChar; // 提前保存状态
        applySaveData(d.save);
        _needCreateChar = false; // 必须在 hideCreateChar 之前清除
        hideCreateChar();

        // 如果是首次创建角色，补充初始化（每日对手、被动应战等）
        if (isFirstChar) {
          var today = todayStr();
          if (!getDailyOpponent() || getDailyOpponent().date !== today) {
            saveDailyOpponent({ date: today, npc: pickDailyOpponent(), completed: false, result: null, usedItem: null, drops: [] });
          }
          if (!getPassiveBattle() || getPassiveBattle().date !== today) {
            savePassiveBattle({ date: today, options: pickPassiveChallengers(), npc: null, completed: false, result: null, usedItem: null, drops: [], battle: null });
          }
          switchPanel("home");
          updateSaveStatus();
        }
        renderAll();
        updateCharBar();
        showToast("角色创建成功：" + name);
      } else {
        showToast("创建失败：" + (d.error || "未知错误"));
      }
    })
    .catch(function(){ showToast("创建失败：服务器未连接"); });
}

// 删除角色
function deleteChar(name) {
  if (_charList.length <= 1) { showToast("至少需要保留一个角色"); return; }
  if (!confirm("确定要删除角色「" + name + "」吗？此操作不可撤销！")) return;
  
  fetch(API_BASE + "/delete", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({name: name})
  })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.success) {
        // 如果删的是当前角色，自动切换
        if (name === _currentChar) {
          switchChar(d.currentChar);
        } else {
          // 刷新列表
          _charList = _charList.filter(function(c){ return c.name !== name; });
          updateCharBar();
        }
        showToast("已删除角色：" + name);
      } else {
        showToast("删除失败：" + (d.error || "未知错误"));
      }
    })
    .catch(function(){ showToast("删除失败：服务器未连接"); });
}

// 应用服务器返回的存档数据
function applySaveData(data) {
  _cache.player = data.player;
  // 兼容旧版：补充 gold 字段
  if (_cache.player && _cache.player.gold === undefined) {
    _cache.player.gold = 0;
  }
  // 兼容旧版装备结构（weapon/armor/accessory → equipped）
  if (_cache.player && !_cache.player.equipped) {
    _cache.player.equipped = {
      weapons: _cache.player.weapon ? [_cache.player.weapon] : [],
      armor: {
        head: null,
        body: _cache.player.armor || null,
        shield: null
      },
      accessories: _cache.player.accessory ? [_cache.player.accessory] : []
    };
    delete _cache.player.weapon;
    delete _cache.player.armor;
    delete _cache.player.accessory;
  }
  _cache.checkinDate = data.checkinDate || "";
  _cache.growthLog = data.growthLog || [];
  // 兼容旧版 dailyOpp 格式（旧版是直接的 NPC 对象）
  if (data.dailyOpp && data.dailyOpp.npc === undefined) {
    _cache.dailyOpp = { npc: data.dailyOpp, completed: false, result: null, usedItem: null, drops: [] };
  } else {
    _cache.dailyOpp = data.dailyOpp || null;
  }
  // 被动应战数据
  if (data.passiveBattle && data.passiveBattle.options) {
    _cache.passiveBattle = data.passiveBattle;
  } else if (data.passiveBattle && data.passiveBattle.npc !== undefined) {
    // 旧v3格式兼容：用旧npc作为第一个选项
    var oldNpc = data.passiveBattle.npc;
    var oldCompleted = data.passiveBattle.completed || false;
    _cache.passiveBattle = {
      options: oldCompleted ? [oldNpc] : pickPassiveChallengers(),
      npc: oldCompleted ? oldNpc : null,
      completed: oldCompleted,
      result: data.passiveBattle.result || null,
      usedItem: data.passiveBattle.usedItem || null,
      drops: data.passiveBattle.drops || [],
      battle: data.passiveBattle.battle || null
    };
  } else if (data.passiveBattle) {
    // 旧v2格式：passiveBattle本身就是NPC对象
    _cache.passiveBattle = { options: [data.passiveBattle], npc: null, completed: false, result: null, usedItem: null, drops: [] };
  } else {
    _cache.passiveBattle = null;
  }
  // 学习汇报数据
  _cache.lastStudyDate = data.lastStudyDate || "";
  _cache.studyLogs = data.studyLogs || [];
  // 主动挑战每日计数
  _cache.activeChallengeDate = data.activeChallengeDate || "";
  _cache.activeChallengeCount = data.activeChallengeCount || 0;
  _cache.serverOnline = true;
  _currentChar = data.currentChar || "";
  _charList = data.characters || [];
}

// 更新角色栏显示
function updateCharBar() {
  var nameEl = document.getElementById("charName");
  if (nameEl) nameEl.textContent = _currentChar || "未知";
  
  var infoEl = document.getElementById("charInfo");
  if (infoEl && _cache.player) {
    var p = _cache.player;
    var invCount = 0;
    for (var k in p.inventory) invCount += p.inventory[k];
    infoEl.textContent = "Lv." + p.level + " · 战力 " + calcPlayerPower(p) + " · 装备 " + invCount + " 件";
  }
  
  // 更新菜单列表
  var listEl = document.getElementById("charMenuList");
  if (listEl) {
    var html = "";
    _charList.forEach(function(c){
      var isCurrent = c.name === _currentChar;
      html += '<div class="char-menu-item' + (isCurrent ? ' active' : '') + '" onclick="' + (isCurrent ? '' : "switchChar('" + c.name + "')") + '">';
      html += '<span class="cm-icon">⚔️</span>';
      html += '<span class="cm-info">';
      html += '<span class="cm-name">' + c.name + '</span>';
      html += '<span class="cm-lvl">Lv.' + c.level + ' · ' + (c.createdAt || '') + '</span>';
      html += '</span>';
      if (_charList.length > 1) {
        html += '<span class="cm-delete" onclick="event.stopPropagation();deleteChar(\'' + c.name + '\')">删除</span>';
      }
      html += '</div>';
    });
    listEl.innerHTML = html;
  }
}

// ===== 主动挑战每日次数 =====
function getActiveChallengeRemaining() {
  var today = todayStr();
  if (_cache.activeChallengeDate !== today) {
    return GAME_CONFIG.dailyActiveChallenge;
  }
  return Math.max(0, GAME_CONFIG.dailyActiveChallenge - (_cache.activeChallengeCount || 0));
}
function useActiveChallenge() {
  var today = todayStr();
  if (_cache.activeChallengeDate !== today) {
    _cache.activeChallengeDate = today;
    _cache.activeChallengeCount = 1;
  } else {
    _cache.activeChallengeCount = (_cache.activeChallengeCount || 0) + 1;
  }
  quickSave();
}

function updateStudyCharCount() {

  if (!input || !counter) return;
  var len = input.value.length;
  var color = len >= 300 ? "var(--win)" : (len >= 150 ? "var(--gold)" : "var(--muted)");
  counter.style.color = color;
  counter.textContent = len + " / 300 字";
}

function submitStudyReport() {
  var input = document.getElementById("studyInput");
  var content = input.value.trim();
  if (!content) {
    showToast("请输入学习心得！");
    return;
  }
  if (content.length < 10) {
    showToast("至少写10个字哦～");
    return;
  }
  
  var player = getPlayer();
  var today = todayStr();
  
  // 内容质量评估（根据字数、段落、关键词等计算加成比例，最高100%）
  var qualityBonus = calcStudyQuality(content);
  var qualityPct = Math.round(qualityBonus * 100);
  
  // === 经验奖励（基础5-8点 + 质量加成，最高10-16点）===
  var baseXp = 5 + Math.floor(Math.random() * 4);
  var xpReward = Math.floor(baseXp * (1 + qualityBonus));
  gainXP(player, xpReward);
  
  // === 属性成长（学习汇报独有，随质量提升）===
  var hpGain = Math.round(2 * (1 + qualityBonus) * 10) / 10;
  var atkGain = Math.round(0.5 * (1 + qualityBonus) * 10) / 10;
  var defGain = Math.round(0.5 * (1 + qualityBonus) * 10) / 10;
  var matkGain = Math.round(0.3 * (1 + qualityBonus) * 10) / 10;
  var mdefGain = Math.round(0.3 * (1 + qualityBonus) * 10) / 10;
  player.hp += hpGain;
  player.atk += atkGain;
  player.def += defGain;
  player.matk += matkGain;
  player.mdef += mdefGain;
  
  // === 装备奖励（保底2件，高质量3件，质量加成提升稀有度）===
  var dropCount = 2 + (qualityBonus >= 0.6 ? 1 : 0);
  var drops = [];
  for (var i = 0; i < dropCount; i++) {
    var item = drawEquipment(qualityBonus);
    if (item) {
      drops.push(item);
      player.inventory[item.id] = (player.inventory[item.id] || 0) + 1;
    }
  }
  
  // 组装奖励文本
  var rewardText = "经验+" + xpReward + " · HP+" + hpGain + " · ATK+" + atkGain + " · DEF+" + defGain + "（质量+" + qualityPct + "%）";
  
  if (drops.length > 0) {
    rewardText += " · 装备" + drops.length + "件：";
    drops.forEach(function(d, idx) {
      if (idx > 0) rewardText += "、";
      rewardText += d.name + "(" + rarityName(d.rarity) + ")";
    });
  }
  
  // 记录
  addStudyLog({
    date: today,
    content: content,
    reward: rewardText,
    xp: xpReward,
    drops: drops,
    quality: qualityPct,
    hpGain: hpGain,
    atkGain: atkGain,
    defGain: defGain
  });
  
  // 添加成长日志
  addGrowthLog({
    date: today,
    icon: "📝",
    desc: "学习汇报（质量+" + qualityPct + "%）",
    gains: rewardText
  });
  
  saveLastStudyDate(today);
  savePlayer(player);
  
  // 缓存本次奖励用于持久显示
  _cache._lastStudyReward = { text: rewardText, drops: drops, quality: qualityPct, date: today, xp: xpReward };
  
  showToast("提交成功！" + rewardText);
  renderStudyPanel();
  renderHome();
}

// 计算学习内容质量加成（0~1.0）
function calcStudyQuality(content) {
  var score = 0;
  var len = content.length;
  
  // 基础分：字数（最多0.5分，300字满分）
  var lenScore = Math.min(0.5, len / 300);
  score += lenScore;
  
  // 段落结构：换行符数量（有分段加0.1）
  var lines = content.split(/\n/).filter(function(l){ return l.trim().length > 0; });
  if (lines.length >= 3) score += 0.1;
  else if (lines.length >= 2) score += 0.05;
  
  // 关键词密度：包含学习相关词汇（统计出现总次数，而不只是是否出现）
  var studyKeywords = ["学习", "总结", "理解", "掌握", "思考", "分析", "问题", "解决", "方法", "技巧",
                       "知识", "概念", "原理", "实践", "应用", "收获", "感悟", "心得", "计划", "目标",
                       "复习", "预习", "研究", "探索", "发现", "验证", "测试", "debug", "代码", "算法",
                       "设计", "架构", "优化", "性能", "效率", "质量", "效果", "结果", "经验", "教训",
                       "学会", "弄懂", "搞懂", "明白", "清楚", "熟悉", "了解", "认识", "体会", "领悟"];
  var totalKeywordCount = 0;
  studyKeywords.forEach(function(kw) {
    // 统计关键词出现的次数
    var re = new RegExp(kw, "g");
    var matches = content.match(re);
    if (matches) totalKeywordCount += matches.length;
  });
  // 每出现1次关键词加0.015，最多加0.2分（约14个关键词满分）
  score += Math.min(0.2, totalKeywordCount * 0.015);
  
  // 标点丰富度：有句号、逗号、感叹号等
  var punctuationCount = (content.match(/[，。！？；：、]/g) || []).length;
  if (punctuationCount >= 10) score += 0.1;
  else if (punctuationCount >= 5) score += 0.05;
  
  // 数字/技术内容：包含数字、代码符号等
  if (/[0-9]/.test(content)) score += 0.05;
  if (/[{}()\[\];=<>]/.test(content)) score += 0.05;
  
  return Math.min(1.0, Math.max(0, score));
}

// ===== 计算玩家总战力 =====
// 计算玩家装备总加成（所有背包装备叠加）
function calcPlayerPower(player) {
  var base = player.atk + player.def + player.matk + player.mdef;
  // 所有背包装备叠加
  var bonus = calcEquipBonus(player);
  return Math.round(base + bonus.atk + bonus.def + bonus.matk + bonus.mdef);
}

// ===== 计算 NPC 总战力 =====
function calcNPCPower(npc) {
  var base = npc.atk + npc.def + npc.matk + npc.mdef;
  var bonus = npc.equipBonus.atk + npc.equipBonus.def + npc.equipBonus.matk + npc.equipBonus.mdef;
  return Math.round(base + bonus);
}

// ===== NPC 等级计算 =====
// 根据战力自动计算等级（1-12级），指数级门槛
function calcNPCLevel(npc) {
  var power = calcNPCPower(npc);
  var thresholds = [0, 25, 50, 80, 115, 155, 200, 250, 300, 350, 420, 500];
  for (var i = thresholds.length - 1; i >= 0; i--) {
    if (power >= thresholds[i]) return Math.min(12, i + 1);
  }
  return 1;
}

// ===== 检查装备是否满足等级要求 =====
function canUseEquip(eq, playerLevel) {
  return playerLevel >= eq.lvl;
}

// ===== 装备加成（等级不够的不生效）=====
function calcEquipBonus(player) {
  var bonus = {atk:0, def:0, matk:0, mdef:0, hp:0, mp:0};
  if (!player.equipped) return bonus;
  
  // 武器：最多2件，全部叠加
  if (player.equipped.weapons && player.equipped.weapons.length > 0) {
    player.equipped.weapons.forEach(function(id) {
      var eq = EQUIP_DB.find(function(e){ return e.id == id; });
      if (eq && canUseEquip(eq, player.level)) {
        bonus.atk += eq.atk || 0;
        bonus.matk += eq.matk || 0;
      }
    });
  }
  
  // 防具：各类型各1件，全部叠加
  if (player.equipped.armor) {
    for (var slot in player.equipped.armor) {
      var id = player.equipped.armor[slot];
      if (!id) continue;
      var eq = EQUIP_DB.find(function(e){ return e.id == id; });
      if (eq && canUseEquip(eq, player.level)) {
        bonus.def += eq.def || 0;
        bonus.mdef += eq.mdef || 0;
        bonus.atk += eq.atk || 0;
        bonus.matk += eq.matk || 0;
        if (eq.hpBonus) bonus.hp += eq.hpBonus;
        if (eq.mpBonus) bonus.mp += eq.mpBonus;
      }
    }
  }
  
  // 饰品：数量随等级，全部叠加
  if (player.equipped.accessories && player.equipped.accessories.length > 0) {
    player.equipped.accessories.forEach(function(id) {
      var eq = EQUIP_DB.find(function(e){ return e.id == id; });
      if (eq && canUseEquip(eq, player.level)) {
        bonus.atk += eq.atk || 0;
        bonus.def += eq.def || 0;
        bonus.matk += eq.matk || 0;
        bonus.mdef += eq.mdef || 0;
        if (eq.hpBonus) bonus.hp += eq.hpBonus;
        if (eq.mpBonus) bonus.mp += eq.mpBonus;
      }
    });
  }

  // 应用装备属性全局倍率
  var mult = (typeof GAME_CONFIG !== 'undefined' && GAME_CONFIG.equipStatMultiplier) ? GAME_CONFIG.equipStatMultiplier : 1;
  bonus.atk = Math.round(bonus.atk * mult * 10) / 10;
  bonus.def = Math.round(bonus.def * mult * 10) / 10;
  bonus.matk = Math.round(bonus.matk * mult * 10) / 10;
  bonus.mdef = Math.round(bonus.mdef * mult * 10) / 10;
  bonus.hp = Math.round(bonus.hp * mult * 10) / 10;
  bonus.mp = Math.round(bonus.mp * mult * 10) / 10;

  return bonus;
}

// ===== 计算装备特效总加成 =====
// 解析所有装备的 effect 描述，提取数值加成
function calcEquipEffects(equips) {
  var effects = {
    allStatPct: 0,      // 全属性+%
    atkPct: 0,          // 攻击+%
    defPct: 0,          // 防御+%
    matkPct: 0,         // 魔法攻击+%
    mdefPct: 0,         // 魔法防御+%
    hpPct: 0,           // HP+%
    mpPct: 0,           // MP+%
    dodgeChance: 0,     // 闪避率
    critChance: 0,      // 暴击率
    critDamage: 0,      // 暴击伤害+%
    revive: false,      // 是否有复活
    reviveHpPct: 0,     // 复活后HP百分比
    firstStrike: false, // 先手攻击
    hpRegen: 0,         // 每回合回血百分比
  };
  
  if (!equips || equips.length === 0) return effects;
  
  equips.forEach(function(eq) {
    if (!eq.effect) return;
    var e = eq.effect;
    var added = {}; // 记录已添加的类型，避免重复
    
    // ===== 全属性+X%（跳过单属性百分比加成，但仍允许其他特效如回血、暴击等继续解析）=====
    var allStatMatch = e.match(/全属性\s*[+加]\s*(\d+)\s*%/);
    if (allStatMatch) {
      effects.allStatPct += parseInt(allStatMatch[1]) / 100;
    }
    if (allStatMatch) {
      // 全属性已覆盖单属性加成，跳过HP/ATK/DEF等百分比解析
      // 但仍解析回血、暴击、闪避、复活等非纯属性特效
    }
    

    // ===== HP相关 =====
    var hpAdded = false;
    // HP+X%
    var hpMatch = e.match(/\bHP\s*[+加]\s*(\d+)\s*%/);
    if (hpMatch) {
      effects.hpPct += parseInt(hpMatch[1]) / 100;
      hpAdded = true;
    }
    // 延续世界之火（HP提升）
    if (!hpAdded && /延续世界之火/.test(e)) {
      var fireHp = e.match(/(\d+)%/);
      if (fireHp) {
        effects.hpPct += parseInt(fireHp[1]) / 100;
        hpAdded = true;
      }
    }
    
    // ===== 攻击相关 =====
    var atkAdded = false;
    // 物理攻击+X%
    var atkMatch = e.match(/物理攻击\s*[+加]\s*(\d+)\s*%/);
    if (atkMatch) {
      effects.atkPct += parseInt(atkMatch[1]) / 100;
      atkAdded = true;
    }
    // 力大无穷/力量手环/力量之戒
    if (!atkAdded && /力大无穷|力量手环|力量之戒/.test(e)) {
      var powerMatch = e.match(/(\d+)%/);
      if (powerMatch) {
        effects.atkPct += parseInt(powerMatch[1]) / 100;
        atkAdded = true;
      }
    }
    // 日间/白天/太阳攻击加成
    if (!atkAdded && /(?:日间|白天|太阳).*攻击/.test(e)) {
      var sunMatch = e.match(/(\d+)%/);
      if (sunMatch) {
        effects.atkPct += parseInt(sunMatch[1]) / 100 * 0.5; // 折算一半
        atkAdded = true;
      }
    }
    // 先手攻击+X%（攻击加成）
    if (!atkAdded && /先手攻击\s*[+加]\s*(\d+)%/.test(e)) {
      var firstAtkMatch = e.match(/先手攻击\s*[+加]\s*(\d+)%/);
      if (firstAtkMatch) {
        effects.atkPct += parseInt(firstAtkMatch[1]) / 100;
        atkAdded = true;
      }
    }
    
    // ===== 魔法攻击相关 =====
    var matkAdded = false;
    // 魔法攻击+X%
    var matkMatch = e.match(/魔法攻击\s*[+加]\s*(\d+)\s*%/);
    if (matkMatch) {
      effects.matkPct += parseInt(matkMatch[1]) / 100;
      matkAdded = true;
    }
    // 智慧/智力+X% / 智慧之冠
    if (!matkAdded && /(?:智慧之冠|智力\+|智慧\+|记忆回溯)/.test(e)) {
      var intMatch = e.match(/(\d+)%/);
      if (intMatch) {
        effects.matkPct += parseInt(intMatch[1]) / 100;
        matkAdded = true;
      }
    }
    
    // ===== 防御相关 =====
    var defAdded = false;
    // 防御+X%
    var defMatch = e.match(/防御\s*[+加]\s*(\d+)\s*%/);
    if (defMatch) {
      effects.defPct += parseInt(defMatch[1]) / 100;
      effects.mdefPct += parseInt(defMatch[1]) / 100;
      defAdded = true;
    }
    // 忠诚守护
    if (!defAdded && /忠诚守护/.test(e)) {
      var loyalMatch = e.match(/(\d+)%/);
      if (loyalMatch) {
        effects.defPct += parseInt(loyalMatch[1]) / 100;
        effects.mdefPct += parseInt(loyalMatch[1]) / 100;
        defAdded = true;
      }
    }
    // 治愈与保护 / 精灵三戒
    if (!defAdded && /治愈与保护|精灵三戒/.test(e)) {
      effects.defPct += 0.1; // 折算10%防御
      effects.mdefPct += 0.1;
      effects.hpRegen += 0.03; // 3%回血
      defAdded = true;
    }
    
    // ===== 闪避 =====
    var dodgeAdded = false;
    // 闪避率+X%
    var dodgeMatch = e.match(/闪避(?:率)?\s*[+加]\s*(\d+)\s*%/);
    if (dodgeMatch) {
      effects.dodgeChance += parseInt(dodgeMatch[1]) / 100;
      dodgeAdded = true;
    }
    // X%概率闪避
    if (!dodgeAdded) {
      var dodgeMatch2 = e.match(/(\d+)%\s*概率闪避/);
      if (dodgeMatch2) {
        effects.dodgeChance += parseInt(dodgeMatch2[1]) / 100;
        dodgeAdded = true;
      }
    }
    // 隐身/隐匿/潜行/滑翔闪避
    if (!dodgeAdded && /(?:隐身|隐匿|潜行|融入自然|夜间隐匿|滑翔|末影传送)/.test(e)) {
      var dodgeMatch3 = e.match(/(\d+)%/);
      if (dodgeMatch3) {
        effects.dodgeChance += parseInt(dodgeMatch3[1]) / 100;
        dodgeAdded = true;
      }
    }
    // 预知/远见 → 折算闪避
    if (!dodgeAdded && /(?:预知|远见|真知晶石)/.test(e)) {
      effects.dodgeChance += 0.08; // 8%闪避
      dodgeAdded = true;
    }
    
    // ===== 暴击 =====
    var critAdded = false;
    // 暴击率+X%
    var critMatch = e.match(/暴击率\s*[+加]\s*(\d+)\s*%/);
    if (critMatch) {
      effects.critChance += parseInt(critMatch[1]) / 100;
      critAdded = true;
    }
    // 好运/幸运暴击
    if (!critAdded && /(?:好运|幸运).*?暴击/.test(e)) {
      var luckMatch = e.match(/(\d+)%/);
      if (luckMatch) {
        effects.critChance += parseInt(luckMatch[1]) / 100;
        critAdded = true;
      }
    }
    // 雷霆一击/额外攻击 → 折算暴击
    if (!critAdded && /(?:雷霆一击|额外攻击|额外伤害)/.test(e)) {
      var extraAtkMatch = e.match(/(\d+)%/);
      if (extraAtkMatch) {
        effects.critChance += parseInt(extraAtkMatch[1]) / 100 * 0.5; // 折算一半暴击率
        critAdded = true;
      }
    }
    // 财富与幸运 → 折算暴击
    if (!critAdded && /(?:财富与幸运|孤山之心|阿尔肯宝石)/.test(e)) {
      var gemMatch = e.match(/(\d+)%/);
      if (gemMatch) {
        effects.critChance += parseInt(gemMatch[1]) / 100 * 0.5; // 折算一半暴击率
        critAdded = true;
      }
    }
    
    // ===== 复活 =====
    if (/复活|涅槃|浴火重生|不死/.test(e)) {
      effects.revive = true;
      var reviveHpMatch = e.match(/以\s*(\d+)%?\s*HP/);
      if (reviveHpMatch) {
        effects.reviveHpPct = Math.max(effects.reviveHpPct, parseInt(reviveHpMatch[1]) / 100);
      } else if (/以1HP|以1血|1HP复活/.test(e)) {
        effects.reviveHpPct = Math.max(effects.reviveHpPct, 0.01);
      } else {
        effects.reviveHpPct = Math.max(effects.reviveHpPct, 0.5);
      }
    }
    
    // ===== 先手/速度 =====
    if (/先手|速度.*?\d+%|极速|疾风|日行千里|减缓时间|开始时先手|时间沙漏|光轮|火弩箭|陆行鸟|飞鞋|风火轮|踏空|扫帚|坐骑/.test(e)) {
      effects.firstStrike = true;
    }
    
    // ===== 对特定类型伤害加成（折算成小量攻防）=====
    if (!atkAdded && !matkAdded) {
      if (/对(?:妖魔|邪恶|黑暗|恶魔|爬虫|变形怪|黑暗系|黑暗生物).*?伤害/.test(e)) {
        var typeDmgMatch = e.match(/(\d+)%/);
        if (typeDmgMatch) {
          var pctVal = parseInt(typeDmgMatch[1]) / 100;
          effects.atkPct += pctVal * 0.3;
          effects.matkPct += pctVal * 0.3;
        }
      }
      // 正气浩然
      if (/正气浩然|对妖魔伤害/.test(e)) {
        var zhengqiMatch = e.match(/(\d+)%/);
        if (zhengqiMatch) {
          effects.atkPct += parseInt(zhengqiMatch[1]) / 100 * 0.3;
          effects.matkPct += parseInt(zhengqiMatch[1]) / 100 * 0.3;
        }
      }
    }
    
    // ===== 每回合回血 =====
    if (/每回合恢复|回复HP|回血/.test(e)) {
      var regenMatch = e.match(/(?:每回合恢复|回复HP|回血)[^，。]*?(\d+)%/);
      if (regenMatch) {
        effects.hpRegen += parseInt(regenMatch[1]) / 100;
      } else {
        effects.hpRegen += 0.05;
      }
    }
    
    // ===== 士气/欲望加成 =====
    if (/士气\+|欲望之镜|厄里斯魔镜/.test(e)) {
      var moraleMatch = e.match(/(\d+)%/);
      if (moraleMatch) {
        var moralePct = parseInt(moraleMatch[1]) / 100;
        effects.atkPct += moralePct * 0.5;
        effects.matkPct += moralePct * 0.5;
      }
    }
    
    // ===== 化龙形态 / 分院帽 等描述性特效 → 折算成全属性小幅提升 =====
    if (/化龙形态|学院之力|分院帽|龙吼之力|灵魂石|封印恶魔/.test(e)) {
      effects.allStatPct += 0.05; // 5%全属性
    }
    
    // ===== 净化/免疫 → 折算成防御提升 =====
    if (/净化|免疫|抵御|守护神/.test(e)) {
      effects.defPct += 0.08;
      effects.mdefPct += 0.08;
    }
    
    // ===== 点石成金/贤者之石 → 折算成魔攻提升 =====
    if (/点石成金|贤者之石/.test(e)) {
      var stoneMatch = e.match(/(\d+)%/);
      if (stoneMatch) {
        effects.matkPct += parseInt(stoneMatch[1]) / 100;
      } else {
        effects.matkPct += 0.15;
      }
    }
    
    // ===== 圣杯/生命回复 → HP提升+回血 =====
    if (/圣杯|生命回复/.test(e)) {
      var grailMatch = e.match(/(\d+)%/);
      if (grailMatch) {
        effects.hpPct += parseInt(grailMatch[1]) / 100;
        effects.hpRegen += parseInt(grailMatch[1]) / 200;
      } else {
        effects.hpPct += 0.2;
        effects.hpRegen += 0.05;
      }
    }
  });
  
  // 限制上限
  effects.dodgeChance = Math.min(0.5, effects.dodgeChance);
  effects.critChance = Math.min(0.8, effects.critChance);
  effects.allStatPct = Math.min(0.6, effects.allStatPct);
  effects.hpPct = Math.min(1.0, effects.hpPct);
  effects.atkPct = Math.min(0.8, effects.atkPct);
  effects.defPct = Math.min(0.8, effects.defPct);
  effects.matkPct = Math.min(0.8, effects.matkPct);
  effects.mdefPct = Math.min(0.8, effects.mdefPct);
  
  return effects;
}

function getPlayerEquips(player) {
  var equips = [];
  if (!player.equipped) return equips;
  
  function addById(id) {
    var eq = EQUIP_DB.find(function(e) { return e.id == id; });
    if (eq) equips.push(eq);
  }
  
  if (player.equipped.weapons) player.equipped.weapons.forEach(addById);
  if (player.equipped.helmet) addById(player.equipped.helmet);
  if (player.equipped.body) addById(player.equipped.body);
  if (player.equipped.shield) addById(player.equipped.shield);
  if (player.equipped.accessories) player.equipped.accessories.forEach(addById);
  if (player.equipped.books) player.equipped.books.forEach(addById);
  
  return equips;
}

// ===== 获取NPC装备列表 =====
function getNPCEquips(npc) {
  var equips = [];
  if (!npc.defaultEquip || npc.defaultEquip.length === 0) return equips;
  
  npc.defaultEquip.forEach(function(id) {
    var eq = EQUIP_DB.find(function(e) { return e.id == id; });
    if (eq) equips.push(eq);
  });
  
  return equips;
}

function getPlayerStats(player) {
  var bonus = calcEquipBonus(player);
  var equips = getPlayerEquips(player);
  var effects = calcEquipEffects(equips);
  
  // 基础属性 + 装备固定加成
  var atk = player.atk + bonus.atk;
  var def = player.def + bonus.def;
  var matk = player.matk + bonus.matk;
  var mdef = player.mdef + bonus.mdef;
  var hp = player.hp + bonus.hp;
  var mp = player.mp + bonus.mp;
  
  // 应用百分比加成
  var totalPct = effects.allStatPct;
  atk = Math.floor(atk * (1 + totalPct + effects.atkPct));
  def = Math.floor(def * (1 + totalPct + effects.defPct));
  matk = Math.floor(matk * (1 + totalPct + effects.matkPct));
  mdef = Math.floor(mdef * (1 + totalPct + effects.mdefPct));
  hp = Math.floor(hp * (1 + effects.hpPct));
  mp = Math.floor(mp * (1 + effects.mpPct));
  
  return {
    hp: hp,
    mp: mp,
    atk: atk,
    def: def,
    matk: matk,
    mdef: mdef,
    effects: effects
  };
}

// ===== 获取NPC总属性 =====
function getNPCStats(npc) {
  var hp = npc.hp;
  var bonus = npc.equipBonus || {};
  var equips = getNPCEquips(npc);
  var effects = calcEquipEffects(equips);
  
  // 基础属性 + 装备固定加成
  var atk = npc.atk + (bonus.atk || 0);
  var def = npc.def + (bonus.def || 0);
  var matk = npc.matk + (bonus.matk || 0);
  var mdef = npc.mdef + (bonus.mdef || 0);
  
  // 应用百分比加成
  var totalPct = effects.allStatPct;
  atk = Math.floor(atk * (1 + totalPct + effects.atkPct));
  def = Math.floor(def * (1 + totalPct + effects.defPct));
  matk = Math.floor(matk * (1 + totalPct + effects.matkPct));
  mdef = Math.floor(mdef * (1 + totalPct + effects.mdefPct));
  hp = Math.floor(hp * (1 + effects.hpPct));
  
  // 英雄级(Boss)额外加成
  if (npc.tier === "hero") {
    hp = Math.floor(hp * GAME_CONFIG.bossHpMultiplier);
    atk = Math.floor(atk * GAME_CONFIG.bossStatMultiplier);
    def = Math.floor(def * GAME_CONFIG.bossStatMultiplier);
    matk = Math.floor(matk * GAME_CONFIG.bossStatMultiplier);
    mdef = Math.floor(mdef * GAME_CONFIG.bossStatMultiplier);
    // 反派Boss再额外提升
    if (npc.type === "villain") {
      hp = Math.floor(hp * GAME_CONFIG.villainHpMultiplier);
      atk = Math.floor(atk * GAME_CONFIG.villainStatMultiplier);
      matk = Math.floor(matk * GAME_CONFIG.villainStatMultiplier);
    }
  }
  
  return {
    hp: hp,
    mp: npc.mp,
    atk: atk,
    def: def,
    matk: matk,
    mdef: mdef,
    effects: effects
  };
}

// ===== 回合制战斗 =====
// 返回 {winner: "player"|"npc"|"draw", rounds: [], usedItem: item|null}
function runBattle(player, npc, usedConsumable) {
  var pStats = getPlayerStats(player);
  var nStats = getNPCStats(npc);
  
  // 消耗品战斗中额外加成（支持多件，不同类型各1件）
  if (usedConsumable && usedConsumable.length > 0) {
    usedConsumable.forEach(function(item) {
      pStats.atk += item.atk || 0;
      pStats.def += item.def || 0;
      pStats.matk += item.matk || 0;
      pStats.mdef += item.mdef || 0;
      if (item.hpBonus) pStats.hp += item.hpBonus;
      if (item.mpBonus) pStats.mp += item.mpBonus;
    });
  }
  
  // 等级差加成（使用配置文件参数）
  var pLvl = player.level;
  var nLvl = calcNPCLevel(npc);
  var lvlDiff = pLvl - nLvl;
  var lvlBonusPct = GAME_CONFIG.levelDamageBonus;
  var maxLvlBonus = GAME_CONFIG.maxLevelDamageBonus;
  // 每差1级，伤害差X%（高等级打低等级加伤害，低等级打高等级减伤害）
  var pLvlBonus = 1 + lvlDiff * lvlBonusPct;
  var nLvlBonus = 1 - lvlDiff * lvlBonusPct;
  // 限制最大 ±X%
  pLvlBonus = Math.max(1 - maxLvlBonus, Math.min(1 + maxLvlBonus, pLvlBonus));
  nLvlBonus = Math.max(1 - maxLvlBonus, Math.min(1 + maxLvlBonus, nLvlBonus));

  // ===== 百科全书加成：仅对对应世界的角色生效，攻击和防御+25% =====
  var encyBonus = 1.0;
  if (hasWorldEncyclopedia(player, npc.world)) {
    encyBonus = 1.25;
    // 增加玩家的攻防属性25%（不含HP/MP）
    pStats.atk = Math.floor(pStats.atk * encyBonus);
    pStats.def = Math.floor(pStats.def * encyBonus);
    pStats.matk = Math.floor(pStats.matk * encyBonus);
    pStats.mdef = Math.floor(pStats.mdef * encyBonus);
  }

  var pHp = pStats.hp;
  var nHp = nStats.hp;
  var rounds = [];
  var maxRounds = GAME_CONFIG.maxBattleRounds;
  var winner = "draw";
  
  var playerRevived = false;
  var npcRevived = false;
  
  for (var i = 1; i <= maxRounds; i++) {
    var round = {round: i, playerDamage: 0, npcDamage: 0, playerCrit: false, npcCrit: false, playerDodged: false, npcDodged: false, special: ""};
    
    // 玩家攻击（先选物理还是魔法，取伤害高的）
    var pAtk = Math.max(pStats.atk, pStats.matk);
    var pIsMagic = pStats.matk > pStats.atk;
    var pDefSide = pIsMagic ? nStats.mdef : nStats.def;
    // 伤害公式：攻击*攻击系数 - 防御*防御系数
    var pDamage = Math.max(1, Math.floor(pAtk * GAME_CONFIG.damageAttackRatio - pDefSide * GAME_CONFIG.damageDefenseRatio));
    // 等级差加成
    pDamage = Math.floor(pDamage * pLvlBonus);
    
    // 暴击（基础暴击率 + 装备加成）
    var pCritChance = GAME_CONFIG.critChance + (pStats.effects ? pStats.effects.critChance : 0);
    if (Math.random() < pCritChance) {
      pDamage = Math.floor(pDamage * GAME_CONFIG.critMultiplier);
      round.playerCrit = true;
    }
    
    // 随机波动
    pDamage = Math.floor(pDamage * (GAME_CONFIG.damageRandomMin + Math.random() * (GAME_CONFIG.damageRandomMax - GAME_CONFIG.damageRandomMin)));
    pDamage = Math.max(1, pDamage);
    
    // NPC闪避
    var nDodgeChance = nStats.effects ? nStats.effects.dodgeChance : 0;
    var npcDodged = Math.random() < nDodgeChance;
    if (npcDodged) {
      pDamage = 0;
      round.npcDodged = true;
      round.special = npc.name + ' 闪避了攻击！';
    }
    
    nHp -= pDamage;
    round.playerDamage = pDamage;
    
    if (nHp <= 0) {
      // NPC复活
      var nEffects = nStats.effects || {};
      if (nEffects.revive && !npcRevived) {
        npcRevived = true;
        var reviveHpN = Math.max(1, Math.floor(nStats.hp * nEffects.reviveHpPct));
        nHp = reviveHpN;
        round.special = (round.special ? round.special + ' ' : '') + '✨ ' + npc.name + ' 触发复活！以 ' + reviveHpN + ' HP 复活！';
        round.npcRevived = true;
      } else {
        nHp = 0;
        round.playerHp = Math.max(0, Math.floor(pHp));
        round.npcHp = 0;
        rounds.push(round);
        winner = "player";
        break;
      }
    }
    
    // NPC攻击
    var nAtk = Math.max(nStats.atk, nStats.matk);
    var nIsMagic = nStats.matk > nStats.atk;
    var nDefSide = nIsMagic ? pStats.mdef : pStats.def;
    var nDamage = Math.max(1, Math.floor(nAtk * GAME_CONFIG.damageAttackRatio - nDefSide * GAME_CONFIG.damageDefenseRatio));
    nDamage = Math.floor(nDamage * nLvlBonus);
    
    // NPC暴击（基础暴击率 + 装备加成）
    var nCritChance = GAME_CONFIG.critChance + (nStats.effects ? nStats.effects.critChance : 0);
    if (Math.random() < nCritChance) {
      nDamage = Math.floor(nDamage * GAME_CONFIG.critMultiplier);
      round.npcCrit = true;
    }
    
    nDamage = Math.floor(nDamage * (GAME_CONFIG.damageRandomMin + Math.random() * (GAME_CONFIG.damageRandomMax - GAME_CONFIG.damageRandomMin)));
    nDamage = Math.max(1, nDamage);
    
    // 玩家闪避
    var pDodgeChance = pStats.effects ? pStats.effects.dodgeChance : 0;
    var playerDodged = Math.random() < pDodgeChance;
    if (playerDodged) {
      nDamage = 0;
      round.playerDodged = true;
      round.special = (round.special ? round.special + ' ' : '') + '你闪避了攻击！';
    }
    
    pHp -= nDamage;
    round.npcDamage = nDamage;
    
    // 每回合回血（双方都有）
    var pRegen = pStats.effects ? pStats.effects.hpRegen : 0;
    var nRegen = nStats.effects ? nStats.effects.hpRegen : 0;
    if (pRegen > 0 && pHp > 0 && pHp < pStats.hp) {
      var healP = Math.floor(pStats.hp * pRegen);
      healP = Math.min(healP, pStats.hp - pHp);
      if (healP > 0) {
        pHp += healP;
        round.playerHeal = healP;
        round.special = (round.special ? round.special + ' ' : '') + '💚 你恢复了 ' + healP + ' HP';
      }
    }
    if (nRegen > 0 && nHp > 0 && nHp < nStats.hp) {
      var healN = Math.floor(nStats.hp * nRegen);
      healN = Math.min(healN, nStats.hp - nHp);
      if (healN > 0) {
        nHp += healN;
        round.npcHeal = healN;
        round.special = (round.special ? round.special + ' ' : '') + '💚 ' + npc.name + ' 恢复了 ' + healN + ' HP';
      }
    }
    
    // Boss技能系统
    if (npc.tier === "hero") {
      var skillChance = npc.type === "villain" ? GAME_CONFIG.villainSkillChance : GAME_CONFIG.bossSkillChance; // 反派Boss技能概率更高
      if (Math.random() < skillChance) {
        // 不同类型的Boss技能
        var skillType = Math.random();
        var skillDmg = 0;
        var skillName = "";
        
        if (skillType < 0.4) {
          // 必杀技：1.5倍伤害
          skillDmg = Math.floor(nDamage * 0.8);
          skillName = npc.name + "释放了必杀技！威力大增！";
        } else if (skillType < 0.7) {
          // 连续攻击：两段伤害
          skillDmg = Math.floor(nDamage * 0.6);
          skillName = npc.name + "发动连续攻击！防不胜防！";
        } else {
          // 蓄力重击：2倍伤害
          skillDmg = Math.floor(nDamage * 1.2);
          skillName = npc.name + "使出全力一击！天崩地裂！";
        }
        
        // 反派Boss额外加成
        if (npc.type === "villain") {
          skillDmg = Math.floor(skillDmg * 1.3);
          skillName += "（黑暗力量加持）";
        }
        
        pHp -= skillDmg;
        round.npcDamage += skillDmg;
        round.special = skillName;
      }
    }
    
    round.playerHp = Math.max(0, Math.floor(pHp));
    round.npcHp = Math.max(0, Math.floor(nHp));
    rounds.push(round);
    
    if (pHp <= 0) {
      winner = "npc";
      break;
    }
  }
  
  // 10回合后按剩余HP比例判定
  if (winner === "draw") {
    if (pHp > nHp) winner = "player";
    else if (nHp > pHp) winner = "npc";
    else winner = "draw";
  }
  
  return {
    winner: winner,
    rounds: rounds,
    playerMaxHp: pStats.hp,
    npcMaxHp: nStats.hp,
    usedItem: usedConsumable,
    playerEffects: pStats.effects,
    npcEffects: nStats.effects
  };
}

    var prevPlayerHp = idx > 0 ? battle.rounds[idx-1].playerHp : battle.playerMaxHp;
    var prevNpcHp = idx > 0 ? battle.rounds[idx-1].npcHp : battle.npcMaxHp;
    var playerHpChange = r.playerHp - prevPlayerHp;
    var npcHpChange = r.npcHp - prevNpcHp;
    var playerHpChangeText = playerHpChange < 0 ? ' <span style="color:#e0526a;font-weight:700;">(' + playerHpChange + ')</span>' : '';
    var npcHpChangeText = npcHpChange < 0 ? ' <span style="color:#e0526a;font-weight:700;">(' + npcHpChange + ')</span>' : '';
    
    html += '<div class="battle-round">';
    html += '<div class="battle-round-title">第 ' + r.round + ' 回合</div>';
    
    // 玩家攻击
    html += '<div class="battle-action player-attack">';
