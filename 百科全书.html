// ==================== 工具函数 ==================== ====================
var currentWorld = 'all';
var currentTab = 'npc';

function calcNPCPower(npc) {
  var base = npc.atk + npc.def + npc.matk + npc.mdef + npc.hp * 0.1 + npc.mp * 0.05;
  if (npc.equipBonus) {
    base += (npc.equipBonus.atk||0) + (npc.equipBonus.def||0) + (npc.equipBonus.matk||0) + (npc.equipBonus.mdef||0);
  }
  return Math.floor(base);
}

function calcNPCLevel(npc) {
  var power = calcNPCPower(npc);
  var thresholds = [0, 25, 50, 80, 115, 155, 200, 250, 300, 350, 420, 500];
  for (var i = thresholds.length - 1; i >= 0; i--) {
    if (power >= thresholds[i]) return Math.min(12, i + 1);
  }
  return 1;
}

function rarityLabel(r) {
  var map = {common:'普通',rare:'稀有',epic:'史诗',legendary:'传说',artifact:'神话'};
  return map[r] || r;
}

function typeLabel(t) {
  var map = {weapon:'武器',armor:'防具',accessory:'饰品',consumable:'消耗品'};
  return map[t] || t;
}

function tierLabel(t) {
  var map = {common:'普通',elite:'精英',hero:'英雄'};
  return map[t] || t;
}

function getEquipName(id) {
  var e = EQUIP_DB.find(function(x){return x.id===id;});
  return e ? e.name : '?';
}

// ==================== 渲染函数 ====================
function renderWorldFilter() {
  var worlds = [];
  var source = currentTab === 'npc' ? NPC_DB : EQUIP_DB;
  source.forEach(function(item) {
    if (worlds.indexOf(item.world) === -1) worlds.push(item.world);
  });
  worlds.sort();
  
  var html = '<button class="world-btn ' + (currentWorld==='all'?'active':'') + '" onclick="filterWorld(\'all\')">全部世界</button>';
  worlds.forEach(function(w) {
    html += '<button class="world-btn ' + (currentWorld===w?'active':'') + '" onclick="filterWorld(\''+w+'\')">'+w+'</button>';
  });
  document.getElementById('worldFilter').innerHTML = html;
}

function filterWorld(w) {
  currentWorld = w;
  renderWorldFilter();
  renderContent();
}

function switchMainTab(tab) {
  currentTab = tab;
  currentWorld = 'all';
  document.querySelectorAll('.main-tab').forEach(function(b){b.classList.remove('active');});
  event.target.classList.add('active');
  document.querySelectorAll('.content-panel').forEach(function(p){p.classList.remove('active');});
  document.getElementById(tab + 'Panel').classList.add('active');
  renderWorldFilter();
  renderStats();
  renderContent();
}

function renderStats() {
  var source = currentTab === 'npc' ? NPC_DB : EQUIP_DB;
  var total = source.length;
  var worlds = {};
  source.forEach(function(item){ worlds[item.world] = (worlds[item.world]||0)+1;});
  var worldCount = Object.keys(worlds).length;
  
  var html = '<div class="stat-box"><div class="stat-box-num">'+total+'</div><div class="stat-box-label">'+(currentTab === 'npc' ? 'NPC总数' : '装备总数')+'</div></div>';
  html += '<div class="stat-box"><div class="stat-box-num">'+worldCount+'</div><div class="stat-box-label">涉及世界</div></div>';
  document.getElementById('statsSummary').innerHTML = html;
}

function renderNPC() {
  var data = NPC_DB;
  if (currentWorld !== 'all') {
    data = data.filter(function(n){return n.world === currentWorld;});
  }
  
  // 按世界分组
  var worlds = {};
  data.forEach(function(n) {
    if (!worlds[n.world]) worlds[n.world] = [];
    worlds[n.world].push(n);
  });
  
  var html = '';
  Object.keys(worlds).sort().forEach(function(w) {
    var npcs = worlds[w].sort(function(a,b){return calcNPCLevel(a)-calcNPCLevel(b);});
    html += '<div class="world-section">';
    html += '<h2 class="world-title">'+w+'</h2>';
    
    // 按类型分组
    var monsters = npcs.filter(function(n){return n.type==='monster';});
    var normals = npcs.filter(function(n){return n.type==='normal';});
    var heroes = npcs.filter(function(n){return n.type==='hero' || n.type==='villain';});
    
    if (monsters.length > 0) {
      html += '<h3 class="section-subtitle">👹 怪物（'+monsters.length+'）</h3>';
      html += '<div class="card-grid">';
      monsters.forEach(function(n){ html += npcCardHTML(n); });
      html += '</div>';
    }
    if (normals.length > 0) {
      html += '<h3 class="section-subtitle">👤 普通人物（'+normals.length+'）</h3>';
      html += '<div class="card-grid">';
      normals.forEach(function(n){ html += npcCardHTML(n); });
      html += '</div>';
    }
    if (heroes.length > 0) {
      html += '<h3 class="section-subtitle">⭐ 英雄/反派（'+heroes.length+'）</h3>';
      html += '<div class="card-grid">';
      heroes.forEach(function(n){ html += npcCardHTML(n); });
      html += '</div>';
    }
    
    html += '</div>';
  });
  
  document.getElementById('npcContent').innerHTML = html;
}

function npcCardHTML(n) {
  var lvl = calcNPCLevel(n);
  var tierClass = 'tier-' + n.tier;
  var eb = n.equipBonus || {atk:0,def:0,matk:0,mdef:0};
  var equipNames = (n.defaultEquip||[]).map(function(id){ return '<span>'+getEquipName(id)+'</span>'; }).join('');
  var drops = '';
  if (n.specialDrops && n.specialDrops.length > 0) {
    drops = '<div class="card-drop-rate">💎 掉落：' + n.specialDrops.map(function(d){
      return getEquipName(d.itemId) + '(' + Math.round(d.chance*100) + '%)';
    }).join('、') + '</div>';
  }
  
  return '<div class="card">' +
    '<span class="type-badge">Lv.'+lvl+'</span>' +
    '<div class="card-header">' +
      '<div class="card-icon">'+n.icon+'</div>' +
      '<div class="card-info">' +
        '<div class="card-name">'+n.name+' <span class="card-tier '+tierClass+'">'+tierLabel(n.tier)+'</span></div>' +
        '<div class="card-level">战力 '+calcNPCPower(n)+' · '+n.world+'</div>' +
      '</div>' +
    '</div>' +
    '<div class="card-stats">' +
      '<div class="stat stat-hp"><div class="stat-label">HP</div><div class="stat-value">'+n.hp+'</div></div>' +
      '<div class="stat stat-atk"><div class="stat-label">ATK</div><div class="stat-value">'+(n.atk+eb.atk)+'</div></div>' +
      '<div class="stat stat-def"><div class="stat-label">DEF</div><div class="stat-value">'+(n.def+eb.def)+'</div></div>' +
      '<div class="stat stat-matk"><div class="stat-label">MATK</div><div class="stat-value">'+(n.matk+eb.matk)+'</div></div>' +
      '<div class="stat stat-mdef"><div class="stat-label">MDEF</div><div class="stat-value">'+(n.mdef+eb.mdef)+'</div></div>' +
      '<div class="stat"><div class="stat-label">MP</div><div class="stat-value">'+n.mp+'</div></div>' +
    '</div>' +
    (equipNames ? '<div class="card-equipment">🎒 装备：'+equipNames+'</div>' : '') +
    drops +
    '<div class="card-desc">'+n.desc+'</div>' +
  '</div>';
}

function renderEquip() {
  var data = EQUIP_DB;
  if (currentWorld !== 'all') {
    data = data.filter(function(e){return e.world === currentWorld;});
  }
  
  var worlds = {};
  data.forEach(function(e) {
    if (!worlds[e.world]) worlds[e.world] = [];
    worlds[e.world].push(e);
  });
  
  var html = '';
  Object.keys(worlds).sort().forEach(function(w) {
    var equips = worlds[w].sort(function(a,b){
      var rOrder = {artifact:5,legendary:4,epic:3,rare:2,common:1};
      return (rOrder[b.rarity]||0) - (rOrder[a.rarity]||0);
    });
    html += '<div class="world-section">';
    html += '<h2 class="world-title">'+w+'</h2>';
    
    var rarities = ['artifact','legendary','epic','rare','common'];
    var rarityNames = {artifact:'神话级',legendary:'传说级',epic:'史诗级',rare:'稀有级',common:'普通级'};
    
    rarities.forEach(function(r) {
      var items = equips.filter(function(e){return e.rarity===r;});
      if (items.length===0) return;
      html += '<h3 class="section-subtitle rarity-'+r+'">'+rarityNames[r]+'（'+items.length+'）</h3>';
      html += '<div class="card-grid">';
      items.forEach(function(e){ html += equipCardHTML(e); });
      html += '</div>';
    });
    
    html += '</div>';
  });
  
  document.getElementById('equipContent').innerHTML = html;
}

function equipCardHTML(e) {
  var typeClass = 'type-' + e.type;
  var rarityClass = 'rarity-' + e.rarity;
  return '<div class="card">' +
    '<span class="type-badge '+typeClass+'">'+typeLabel(e.type)+'</span>' +
    '<div class="card-header">' +
      '<div class="card-icon">'+e.icon+'</div>' +
      '<div class="card-info">' +
        '<div class="card-name '+rarityClass+'">'+e.name+'</div>' +
        '<div class="card-level">等级 '+e.lvl+' · <span class="'+rarityClass+'">'+rarityLabel(e.rarity)+'</span> · '+e.world+'</div>' +
      '</div>' +
    '</div>' +
    '<div class="card-stats">' +
      '<div class="stat stat-atk"><div class="stat-label">ATK</div><div class="stat-value">'+(e.atk||0)+'</div></div>' +
      '<div class="stat stat-def"><div class="stat-label">DEF</div><div class="stat-value">'+(e.def||0)+'</div></div>' +
      '<div class="stat stat-matk"><div class="stat-label">MATK</div><div class="stat-value">'+(e.matk||0)+'</div></div>' +
      '<div class="stat stat-mdef"><div class="stat-label">MDEF</div><div class="stat-value">'+(e.mdef||0)+'</div></div>' +
      '<div class="stat stat-hp"><div class="stat-label">HP</div><div class="stat-value">'+(e.hpBonus||0)+'</div></div>' +
      '<div class="stat"><div class="stat-label">等级</div><div class="stat-value">Lv.'+e.lvl+'</div></div>' +
    '</div>' +
    '<div class="card-effect">' +
      '<div class="card-effect-title">✨ 特效</div>' +
      e.effect +
    '</div>' +
    '<div class="card-desc">'+e.desc+'</div>' +
  '</div>';
}

function renderContent() {
  if (currentTab === 'npc') {
    renderNPC();
  } else {
    renderEquip();
  }
}

// ==================== 返回顶部 ====================
window.addEventListener('scroll', function() {
  var btn = document.getElementById('backToTop');
  if (window.scrollY > 300) {
    btn.classList.add('visible');
  } else {
    btn.classList.remove('visible');
  }
});

// ==================== 初始化 ====================
window.onload = function() {
  renderWorldFilter();
  renderStats();
  renderContent();
};
</script>
</body>
</html>
